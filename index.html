<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>课堂小助手 - 多媒体教学工具</title>
<style>
  :root {
    --bg: #F0F4FF;
    --bg2: #E8EEFF;
    --ink: #2D3748;
    --muted: #8896AB;
    --rule: #D4DDEF;
    --accent: #5B7FFF;
    --accent2: #A78BFA;
    --success: #34D399;
    --warning: #FBBF24;
    --error: #F87171;
    --card: rgba(255,255,255,0.88);
    --shadow: 0 8px 32px rgba(45,55,72,0.08);
    --shadow-lg: 0 16px 48px rgba(45,55,72,0.12);
    --radius: 24px;
    --radius-sm: 14px;
    --radius-xs: 8px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg); color: var(--ink);
    min-height: 100vh; overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 15% 10%, rgba(91,127,255,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 85% 90%, rgba(167,139,250,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(91,127,255,0.03) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }

  /* ===== HEADER ===== */
  .app-header {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 32px;
    background: var(--card);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--rule);
    box-shadow: 0 2px 16px rgba(45,55,72,0.05);
  }
  .app-logo {
    display: flex; align-items: center; gap: 12px;
  }
  .app-logo-icon {
    width: 42px; height: 42px; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem; color: white;
    box-shadow: 0 4px 12px rgba(91,127,255,0.3);
  }
  .app-logo-text {
    font-size: 1.25rem; font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .app-logo-sub { font-size: 0.72rem; color: var(--muted); margin-top: -2px; }

  /* ===== NAV TABS ===== */
  .nav-tabs {
    position: relative; z-index: 10;
    display: flex; gap: 4px; padding: 16px 32px 0;
    background: transparent;
  }
  .nav-tab {
    padding: 12px 24px; border: none; background: transparent;
    font-size: 0.95rem; font-weight: 600; color: var(--muted);
    cursor: pointer; font-family: inherit;
    border-radius: var(--radius) var(--radius) 0 0;
    transition: all 0.3s ease;
    position: relative;
  }
  .nav-tab:hover { color: var(--ink); background: rgba(91,127,255,0.05); }
  .nav-tab.active {
    color: white;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    box-shadow: 0 4px 16px rgba(91,127,255,0.25);
  }
  .nav-tab-icon { margin-right: 6px; font-size: 1.1em; }

  /* ===== MAIN ===== */
  .main-area {
    position: relative; z-index: 5;
    padding: 32px;
    min-height: calc(100vh - 140px);
    display: flex; align-items: flex-start; justify-content: center;
  }

  /* ===== PANEL ===== */
  .panel {
    display: none; width: 100%; max-width: 900px;
    animation: fadeSlideIn 0.45s ease;
  }
  .panel.active { display: block; }
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes bounceIn {
    0% { opacity: 0; transform: scale(0.5); }
    60% { opacity: 1; transform: scale(1.08); }
    100% { transform: scale(1); }
  }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.04); } }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-6px); } 40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); } 80% { transform: translateX(4px); }
  }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes confettiFall {
    0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
  @keyframes glow {
    0%,100% { box-shadow: 0 0 20px rgba(91,127,255,0.2); }
    50% { box-shadow: 0 0 40px rgba(91,127,255,0.5); }
  }
  @keyframes nameReveal {
    0% { transform: scale(0.3) rotateY(90deg); opacity: 0; }
    60% { transform: scale(1.1) rotateY(-10deg); opacity: 1; }
    100% { transform: scale(1) rotateY(0); }
  }
  @keyframes slotRoll {
    0% { transform: translateY(0); }
    100% { transform: translateY(-100%); }
  }
  @keyframes ringPulse {
    0% { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(2.5); opacity: 0; }
  }
  @keyframes floatUp {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 0.12; } 90% { opacity: 0.12; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
  }
  @keyframes timerPulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.02); }
  }

  /* ===== CARD ===== */
  .card {
    background: var(--card); backdrop-filter: blur(12px);
    border-radius: var(--radius); box-shadow: var(--shadow);
    border: 1px solid rgba(91,127,255,0.08);
    padding: 32px; width: 100%;
    transition: box-shadow 0.3s ease;
  }
  .card:hover { box-shadow: var(--shadow-lg); }

  /* ===== BUTTONS ===== */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 12px 28px; border: none; border-radius: 30px;
    font-size: 1rem; font-weight: 700; cursor: pointer;
    font-family: inherit; transition: all 0.3s ease;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white; box-shadow: 0 4px 16px rgba(91,127,255,0.3);
  }
  .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(91,127,255,0.4); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-secondary {
    background: var(--bg2); color: var(--accent); border: 2px solid transparent;
  }
  .btn-secondary:hover { border-color: var(--accent); transform: translateY(-2px); }
  .btn-success {
    background: linear-gradient(135deg, #34D399, #10B981);
    color: white; box-shadow: 0 4px 16px rgba(52,211,153,0.3);
  }
  .btn-success:hover { transform: translateY(-3px); }
  .btn-danger {
    background: linear-gradient(135deg, #F87171, #EF4444);
    color: white; box-shadow: 0 4px 16px rgba(248,113,113,0.3);
  }
  .btn-danger:hover { transform: translateY(-3px); }
  .btn-sm { padding: 8px 18px; font-size: 0.85rem; border-radius: 20px; }
  .btn-lg { padding: 16px 48px; font-size: 1.2rem; border-radius: 40px; }
  .btn-icon {
    width: 48px; height: 48px; padding: 0;
    border-radius: 50%; font-size: 1.2rem;
  }
  .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }

  /* ================================================================
     PANEL 1: RANDOM ROLL CALL
     ================================================================ */
  .rollcall-display {
    width: 100%; min-height: 280px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    position: relative; overflow: hidden;
    border-radius: var(--radius-sm);
    background: linear-gradient(180deg, rgba(91,127,255,0.04), rgba(167,139,250,0.06));
    margin-bottom: 24px;
  }
  .rollcall-name {
    font-size: 4.5rem; font-weight: 900;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 12px;
    transition: all 0.1s ease;
    min-height: 80px;
    display: flex; align-items: center; justify-content: center;
  }
  .rollcall-name.rolling {
    animation: pulse 0.15s ease infinite;
    filter: blur(1px);
  }
  .rollcall-name.revealed {
    animation: nameReveal 0.6s cubic-bezier(0.34,1.56,0.64,1);
    filter: blur(0);
    font-size: 5rem;
  }
  .rollcall-hint {
    font-size: 1rem; color: var(--muted); margin-top: 8px;
  }
  .rollcall-ring {
    position: absolute; width: 200px; height: 200px;
    border: 3px solid var(--accent); border-radius: 50%;
    opacity: 0;
  }
  .rollcall-ring.pulse {
    animation: ringPulse 1s ease-out;
  }
  .rollcall-controls {
    display: flex; gap: 12px; justify-content: center;
    margin-bottom: 20px;
  }
  .rollcall-history {
    display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px;
  }
  .rollcall-history-tag {
    padding: 6px 14px; border-radius: 20px;
    background: var(--bg2); color: var(--muted);
    font-size: 0.82rem; font-weight: 600;
    animation: fadeSlideIn 0.3s ease;
  }

  /* ===== Name List Editor ===== */
  .name-editor {
    margin-top: 20px;
  }
  .name-editor-toggle {
    display: flex; align-items: center; gap: 8px;
    cursor: pointer; color: var(--accent);
    font-weight: 600; font-size: 0.9rem;
    background: none; border: none; font-family: inherit;
    padding: 8px 0; transition: color 0.2s;
  }
  .name-editor-toggle:hover { color: var(--accent2); }
  .name-editor-toggle .arrow { transition: transform 0.3s; display: inline-block; }
  .name-editor-toggle.open .arrow { transform: rotate(90deg); }
  .name-editor-body {
    display: none; margin-top: 12px;
  }
  .name-editor-body.show { display: block; animation: fadeSlideIn 0.3s ease; }
  .name-textarea {
    width: 100%; min-height: 120px;
    padding: 16px; border: 2px solid var(--rule);
    border-radius: var(--radius-sm); font-size: 0.95rem;
    font-family: inherit; color: var(--ink);
    resize: vertical; outline: none;
    transition: border-color 0.3s;
    line-height: 1.8;
  }
  .name-textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(91,127,255,0.1); }
  .name-textarea::placeholder { color: var(--muted); }
  .import-row {
    display: flex; gap: 8px; align-items: center;
    margin-top: 10px; padding: 10px 14px;
    background: var(--bg2); border-radius: var(--radius-sm);
  }
  .import-row-label { font-size: 0.8rem; color: var(--muted); font-weight: 600; white-space: nowrap; }
  .import-file-input { display: none; }
  .import-hint { font-size: 0.72rem; color: var(--muted); margin-top: 4px; line-height: 1.4; }
  .name-editor-footer {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 10px; font-size: 0.8rem; color: var(--muted);
  }

  /* ================================================================
     PANEL 2: TIMER
     ================================================================ */
  .timer-container {
    display: flex; flex-direction: column; align-items: center;
    gap: 28px;
  }
  .timer-circle-wrap {
    position: relative; width: 300px; height: 300px;
  }
  .timer-circle-wrap svg {
    width: 100%; height: 100%;
    transform: rotate(-90deg);
  }
  .timer-circle-bg {
    fill: none; stroke: var(--bg2); stroke-width: 12;
  }
  .timer-circle-fg {
    fill: none; stroke: url(#timerGradient); stroke-width: 12;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.3s linear;
  }
  .timer-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .timer-display {
    font-size: 4.5rem; font-weight: 900;
    color: var(--ink); letter-spacing: 2px;
    font-variant-numeric: tabular-nums;
    transition: color 0.3s;
  }
  .timer-display.warning { color: var(--warning); }
  .timer-display.danger { color: var(--error); animation: timerPulse 0.5s infinite; }
  .timer-label {
    font-size: 0.9rem; color: var(--muted); margin-top: 4px;
  }
  .timer-presets {
    display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
  }
  .preset-btn {
    padding: 10px 22px; border-radius: 24px;
    border: 2px solid var(--rule); background: white;
    font-size: 0.9rem; font-weight: 600; color: var(--ink);
    cursor: pointer; font-family: inherit;
    transition: all 0.25s ease;
  }
  .preset-btn:hover {
    border-color: var(--accent); color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(91,127,255,0.15);
  }
  .preset-btn.active {
    border-color: var(--accent); color: white;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
  }
  .timer-custom-input {
    display: flex; align-items: center; gap: 8px;
  }
  .timer-input {
    width: 80px; padding: 10px 12px; text-align: center;
    border: 2px solid var(--rule); border-radius: var(--radius-xs);
    font-size: 1.1rem; font-weight: 700; font-family: inherit;
    color: var(--ink); outline: none;
    transition: border-color 0.3s;
  }
  .timer-input:focus { border-color: var(--accent); }
  .timer-input-label { font-size: 0.9rem; color: var(--muted); font-weight: 600; }
  .timer-actions { display: flex; gap: 14px; }
  .timer-mode-toggle {
    display: flex; gap: 0; border-radius: 24px; overflow: hidden;
    border: 2px solid var(--rule);
  }
  .timer-mode-btn {
    padding: 10px 24px; border: none; background: white;
    font-size: 0.9rem; font-weight: 600; color: var(--muted);
    cursor: pointer; font-family: inherit; transition: all 0.25s;
  }
  .timer-mode-btn.active {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
  }

  /* ================================================================
     PANEL 3: SCOREBOARD
     ================================================================ */
  .scoreboard-config {
    display: flex; gap: 12px; align-items: center;
    flex-wrap: wrap; margin-bottom: 24px;
    justify-content: center;
  }
  .scoreboard-config label {
    font-size: 0.9rem; font-weight: 600; color: var(--muted);
  }
  .group-count-input {
    width: 64px; padding: 8px 12px; text-align: center;
    border: 2px solid var(--rule); border-radius: var(--radius-xs);
    font-size: 1rem; font-weight: 700; font-family: inherit;
    color: var(--ink); outline: none;
  }
  .group-count-input:focus { border-color: var(--accent); }
  .scoreboard-grid {
    display: grid; gap: 16px; margin-bottom: 24px;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  }
  .group-card {
    background: white; border-radius: var(--radius);
    padding: 24px 16px; text-align: center;
    border: 2px solid var(--rule);
    transition: all 0.35s ease;
    position: relative; overflow: hidden;
    animation: fadeSlideIn 0.4s ease both;
  }
  .group-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 5px; background: linear-gradient(90deg, var(--accent), var(--accent2));
    transform: scaleX(0); transition: transform 0.3s;
    transform-origin: left;
  }
  .group-card:hover::before { transform: scaleX(1); }
  .group-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 24px rgba(91,127,255,0.12);
    border-color: rgba(91,127,255,0.15);
  }
  .group-card.first {
    border-color: var(--warning);
    box-shadow: 0 0 0 3px rgba(251,191,36,0.2), 0 8px 24px rgba(251,191,36,0.15);
  }
  .group-card.first::before {
    background: linear-gradient(90deg, #FBBF24, #F59E0B);
    transform: scaleX(1);
  }
  .group-name-input {
    width: 100%; text-align: center; border: none;
    font-size: 1.1rem; font-weight: 700; color: var(--ink);
    background: transparent; outline: none;
    font-family: inherit; padding: 4px 0;
    border-bottom: 2px solid transparent;
    transition: border-color 0.3s;
  }
  .group-name-input:focus { border-bottom-color: var(--accent); }
  .group-score {
    font-size: 3.5rem; font-weight: 900;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin: 12px 0;
    transition: all 0.3s ease;
  }
  .group-score.bump { animation: bounceIn 0.4s ease; }
  .group-rank {
    position: absolute; top: 12px; right: 12px;
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem; font-weight: 800;
    color: white;
    background: var(--muted);
  }
  .group-card.first .group-rank { background: linear-gradient(135deg, #FBBF24, #F59E0B); }
  .group-card:nth-child(2) .group-rank { background: linear-gradient(135deg, #94A3B8, #64748B); }
  .group-card:nth-child(3) .group-rank { background: linear-gradient(135deg, #D97706, #B45309); }
  .group-btns { display: flex; gap: 8px; justify-content: center; margin-top: 8px; }
  .group-btn {
    width: 40px; height: 40px; border-radius: 50%;
    border: 2px solid var(--rule); background: white;
    font-size: 1.1rem; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-family: inherit; transition: all 0.25s;
  }
  .group-btn.plus:hover { border-color: var(--success); color: var(--success); background: rgba(52,211,153,0.08); }
  .group-btn.minus:hover { border-color: var(--error); color: var(--error); background: rgba(248,113,113,0.08); }
  .group-btn.plus5:hover { border-color: var(--accent); color: var(--accent); background: rgba(91,127,255,0.08); }
  .group-btn.minus5:hover { border-color: var(--warning); color: #D97706; background: rgba(251,191,36,0.08); }

  /* Score Change Popup */
  .score-popup {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 1.8rem; font-weight: 900;
    pointer-events: none; z-index: 10;
    animation: scoreFloat 1s ease forwards;
  }
  @keyframes scoreFloat {
    0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
    30% { transform: translate(-50%, -70%) scale(1.2); }
    100% { opacity: 0; transform: translate(-50%, -120%) scale(0.8); }
  }

  .scoreboard-footer {
    display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
  }

  /* ================================================================
     PANEL 4: WHEEL / SPINNER
     ================================================================ */
  .wheel-container {
    display: flex; flex-direction: column; align-items: center; gap: 24px;
  }
  .wheel-wrap {
    position: relative; width: 420px; height: 420px;
  }
  .wheel-canvas {
    width: 100%; height: 100%;
    transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
  }
  .wheel-pointer {
    position: absolute; top: -18px; left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 18px solid transparent;
    border-right: 18px solid transparent;
    border-top: 36px solid var(--accent);
    filter: drop-shadow(0 2px 6px rgba(91,127,255,0.4));
    z-index: 5;
  }
  .wheel-center {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 64px; height: 64px; border-radius: 50%;
    background: white; border: 4px solid var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem; font-weight: 900; color: var(--accent);
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    z-index: 5; cursor: pointer;
    transition: transform 0.3s;
  }
  .wheel-center:hover { transform: translate(-50%, -50%) scale(1.1); }

  .wheel-result {
    min-height: 80px; text-align: center;
    font-size: 1.6rem; font-weight: 800;
    color: var(--accent);
  }
  .wheel-result.revealed {
    animation: nameReveal 0.6s cubic-bezier(0.34,1.56,0.64,1);
  }

  /* Wheel Options Editor */
  .wheel-editor {
    width: 100%; max-width: 500px;
  }
  .wheel-options-list {
    display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0;
  }
  .wheel-option-tag {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px; border-radius: 20px;
    background: white; border: 2px solid var(--rule);
    font-size: 0.85rem; font-weight: 600; color: var(--ink);
    animation: fadeSlideIn 0.3s ease;
  }
  .wheel-option-tag .remove-opt {
    cursor: pointer; color: var(--muted); font-weight: 700;
    transition: color 0.2s; background: none; border: none;
    font-family: inherit; font-size: 1rem; padding: 0 2px;
  }
  .wheel-option-tag .remove-opt:hover { color: var(--error); }
  .wheel-option-color {
    width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0;
  }
  .wheel-add-row {
    display: flex; gap: 8px;
  }
  .wheel-add-input {
    flex: 1; padding: 10px 16px;
    border: 2px solid var(--rule); border-radius: 24px;
    font-size: 0.9rem; font-family: inherit; color: var(--ink);
    outline: none; transition: border-color 0.3s;
  }
  .wheel-add-input:focus { border-color: var(--accent); }
  .wheel-presets {
    display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px;
  }

  /* ===== PARTICLES ===== */
  .particles {
    position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
  }
  .particle {
    position: absolute; border-radius: 50%; opacity: 0.12;
    animation: floatUp linear infinite;
  }

  /* ===== CONFETTI ===== */
  .confetti {
    position: fixed; pointer-events: none; z-index: 999;
    width: 10px; height: 10px; border-radius: 2px;
    animation: confettiFall linear forwards;
  }

  /* ===== TOAST ===== */
  .toast {
    position: fixed; top: 24px; left: 50%;
    transform: translateX(-50%) translateY(-120px);
    padding: 14px 32px; border-radius: 30px;
    font-size: 1.05rem; font-weight: 700; color: white;
    z-index: 1000; transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
    pointer-events: none; box-shadow: 0 8px 24px rgba(0,0,0,0.15);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { background: linear-gradient(135deg, #34D399, #10B981); }
  .toast.error { background: linear-gradient(135deg, #F87171, #EF4444); }
  .toast.info { background: linear-gradient(135deg, var(--accent), var(--accent2)); }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 768px) {
    .app-header { padding: 12px 16px; }
    .nav-tabs { padding: 12px 12px 0; gap: 2px; }
    .nav-tab { padding: 10px 14px; font-size: 0.82rem; }
    .main-area { padding: 16px; }
    .card { padding: 20px 16px; }
    .rollcall-name { font-size: 3rem; letter-spacing: 6px; }
    .rollcall-name.revealed { font-size: 3.5rem; }
    .timer-circle-wrap { width: 240px; height: 240px; }
    .timer-display { font-size: 3.5rem; }
    .wheel-wrap { width: 320px; height: 320px; }
    .scoreboard-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
    .group-score { font-size: 2.5rem; }
  }
  @media (max-width: 480px) {
    .nav-tab-icon { display: none; }
    .wheel-wrap { width: 280px; height: 280px; }
    .timer-circle-wrap { width: 200px; height: 200px; }
    .timer-display { font-size: 2.8rem; }
    .rollcall-name { font-size: 2.2rem; }
  }

  /* ================================================================
     PANEL 5: LEARNING RECORDS (学习记录)
     ================================================================ */
  .record-stats {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 14px; margin-bottom: 28px;
  }
  .record-stat-card {
    background: var(--bg2); border-radius: var(--radius-sm);
    padding: 20px 14px; text-align: center;
    transition: transform 0.3s, box-shadow 0.3s;
  }
  .record-stat-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(91,127,255,0.12); }
  .record-stat-value {
    font-size: 2rem; font-weight: 900;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .record-stat-label { font-size: 0.78rem; color: var(--muted); margin-top: 4px; }

  .record-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
  .record-item {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 20px; background: white;
    border-radius: var(--radius-sm); border: 1px solid var(--rule);
    transition: all 0.25s ease;
    animation: fadeSlideIn 0.4s ease both;
  }
  .record-item:hover { border-color: rgba(91,127,255,0.2); box-shadow: 0 4px 16px rgba(91,127,255,0.08); }
  .record-item-info { flex: 1; min-width: 0; }
  .record-item-module { font-size: 0.95rem; font-weight: 700; color: var(--ink); margin-bottom: 2px; }
  .record-item-meta { font-size: 0.78rem; color: var(--muted); }
  .record-item-score {
    font-size: 1rem; font-weight: 800; color: var(--accent);
    white-space: nowrap; padding: 4px 12px;
    background: rgba(91,127,255,0.08); border-radius: 20px;
  }
  .record-item-time { font-size: 0.75rem; color: var(--muted); white-space: nowrap; }
  .record-item-action { flex-shrink: 0; }

  .record-empty {
    text-align: center; padding: 60px 20px;
  }
  .record-empty-icon { font-size: 4rem; margin-bottom: 16px; opacity: 0.6; }
  .record-empty-text { font-size: 1.1rem; color: var(--muted); margin-bottom: 24px; }
  .record-footer { text-align: center; }

  @media (max-width: 640px) {
    .record-stats { grid-template-columns: 1fr; gap: 10px; }
    .record-stat-card { padding: 14px 10px; }
    .record-item { flex-wrap: wrap; gap: 8px; }
    .record-item-score { order: 3; }
  }

  /* ================================================================
     PANEL 5: QUIZ GAME (语文大闯关)
     ================================================================ */
  /* Screen Management */
  .qg-screen { display: none; width: 100%; animation: qgFadeIn 0.5s ease; }
  .qg-screen.active { display: flex; flex-direction: column; align-items: center; }
  @keyframes qgFadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes qgBounceIn {
    0% { opacity: 0; transform: scale(0.3); }
    50% { opacity: 1; transform: scale(1.05); }
    70% { transform: scale(0.95); }
    100% { transform: scale(1); }
  }
  @keyframes qgSlideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes qgPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }
  @keyframes qgShake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(6px); }
  }
  @keyframes qgNameReveal {
    0% { transform: scale(0.3) rotateY(90deg); opacity: 0; }
    60% { transform: scale(1.1) rotateY(-10deg); opacity: 1; }
    100% { transform: scale(1) rotateY(0); }
  }

  /* Menu Screen */
  .qg-menu-title {
    font-size: 3rem; font-weight: 900;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px; text-align: center;
    animation: qgBounceIn 0.8s ease;
    letter-spacing: 4px;
  }
  .qg-menu-subtitle {
    font-size: 1.1rem; color: var(--muted); margin-bottom: 40px;
    text-align: center; animation: qgSlideUp 0.8s ease 0.2s both;
  }

  /* Difficulty Selector */
  .qg-difficulty-selector {
    display: flex; gap: 10px; justify-content: center;
    margin-bottom: 30px;
  }
  .qg-diff-btn {
    padding: 8px 20px; border-radius: 20px;
    border: 2px solid var(--rule);
    background: transparent; color: var(--muted);
    font-size: 0.85rem; font-weight: 600;
    cursor: pointer; font-family: inherit;
    transition: all 0.3s ease;
  }
  .qg-diff-btn.active {
    border-color: var(--accent); color: var(--accent);
    background: rgba(91,127,255,0.08);
  }
  .qg-diff-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Mode Grid */
  .qg-mode-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 16px; width: 100%; max-width: 600px;
    margin-top: 20px;
  }
  .qg-mode-card {
    background: var(--card);
    backdrop-filter: blur(12px);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 2px solid transparent;
    padding: 24px 16px;
    cursor: pointer;
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    text-align: center;
    position: relative; overflow: hidden;
    animation: qgSlideUp 0.6s ease both;
  }
  .qg-mode-card:nth-child(1) { animation-delay: 0.1s; }
  .qg-mode-card:nth-child(2) { animation-delay: 0.2s; }
  .qg-mode-card:nth-child(3) { animation-delay: 0.3s; }
  .qg-mode-card:nth-child(4) { animation-delay: 0.4s; }

  .qg-mode-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transform: scaleX(0); transition: transform 0.35s ease;
    transform-origin: left;
  }
  .qg-mode-card:hover::before { transform: scaleX(1); }
  .qg-mode-card:hover {
    transform: translateY(-6px);
    box-shadow: var(--shadow-lg);
    border-color: rgba(91,127,255,0.2);
  }
  .qg-mode-card:active { transform: translateY(-2px) scale(0.98); }

  .qg-mode-icon {
    font-size: 2.8rem; margin-bottom: 12px; display: block;
    transition: transform 0.35s ease;
  }
  .qg-mode-card:hover .qg-mode-icon { transform: scale(1.15) rotate(-5deg); }
  .qg-mode-name {
    font-size: 1.15rem; font-weight: 700; color: var(--ink);
    margin-bottom: 6px;
  }
  .qg-mode-desc {
    font-size: 0.82rem; color: var(--muted); line-height: 1.4;
  }

  /* Game Header */
  .qg-game-header {
    display: flex; justify-content: space-between; align-items: center;
    width: 100%; max-width: 600px; margin-bottom: 20px;
    animation: qgSlideUp 0.5s ease;
  }
  .qg-header-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 0.95rem; font-weight: 600; color: var(--ink);
  }
  .qg-header-icon { font-size: 1.2rem; }
  .qg-header-score { color: var(--accent); font-size: 1.1rem; }

  /* Back Button */
  .qg-back-btn {
    position: absolute; top: 20px; left: 20px;
    background: var(--card); border: 2px solid var(--rule);
    border-radius: 50%; width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 1.2rem; color: var(--muted);
    transition: all 0.3s ease; z-index: 10;
    font-family: inherit;
  }
  .qg-back-btn:hover { border-color: var(--accent); color: var(--accent); transform: scale(1.1); }

  /* Progress Bar */
  .qg-progress-bar {
    width: 100%; max-width: 600px; height: 10px;
    background: var(--bg2); border-radius: 10px;
    margin-bottom: 24px; overflow: hidden;
    animation: qgSlideUp 0.5s ease 0.1s both;
  }
  .qg-progress-fill {
    height: 100%; border-radius: 10px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    width: 0;
  }

  /* Timer Bar */
  .qg-timer-bar {
    width: 100%; max-width: 600px; height: 6px;
    background: var(--bg2); border-radius: 6px;
    margin-bottom: 16px; overflow: hidden;
  }
  .qg-timer-fill {
    height: 100%; border-radius: 6px;
    background: linear-gradient(90deg, var(--success), var(--accent2));
    transition: width 0.1s linear;
    width: 100%;
  }
  .qg-timer-fill.warning { background: linear-gradient(90deg, var(--accent2), var(--accent)); }
  .qg-timer-fill.danger { background: linear-gradient(90deg, var(--accent), var(--error)); }

  /* Question Card */
  .qg-question-card {
    background: var(--card);
    backdrop-filter: blur(12px);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid rgba(167,139,250,0.15);
    padding: 36px 32px;
    width: 100%; max-width: 600px;
    text-align: center;
    animation: qgBounceIn 0.5s ease;
  }
  .qg-question-type {
    display: inline-block;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white; font-size: 0.78rem; font-weight: 700;
    padding: 4px 14px; border-radius: 20px;
    margin-bottom: 20px; letter-spacing: 1px;
  }
  .qg-question-text {
    font-size: 1.5rem; font-weight: 700; line-height: 1.6;
    color: var(--ink); margin-bottom: 28px;
  }
  .qg-question-hint {
    font-size: 0.85rem; color: var(--muted); margin-top: 12px;
    font-style: italic;
  }
  .qg-blank-slot {
    display: inline-block;
    min-width: 80px; padding: 2px 16px;
    border-bottom: 3px dashed var(--accent);
    color: var(--accent); font-weight: 900;
    margin: 0 4px; transition: all 0.3s ease;
  }

  /* Options Grid */
  .qg-options-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px; width: 100%; max-width: 600px;
    margin-top: 24px;
  }
  .qg-option-btn {
    background: var(--card);
    backdrop-filter: blur(10px);
    border: 2px solid var(--rule);
    border-radius: var(--radius-sm);
    padding: 16px 12px;
    font-size: 1.1rem; font-weight: 600;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.25s ease;
    font-family: inherit;
    position: relative; overflow: hidden;
  }
  .qg-option-btn:hover {
    border-color: var(--accent);
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(91,127,255,0.15);
  }
  .qg-option-btn:active { transform: translateY(0) scale(0.97); }

  .qg-option-btn.correct {
    border-color: var(--success); background: rgba(52,211,153,0.1);
    animation: qgPulse 0.5s ease;
    color: var(--success);
  }
  .qg-option-btn.wrong {
    border-color: var(--error); background: rgba(248,113,113,0.08);
    animation: qgShake 0.5s ease;
    color: var(--error);
  }
  .qg-option-btn.disabled {
    pointer-events: none; opacity: 0.6;
  }
  .qg-option-btn.show-correct {
    border-color: var(--success); background: rgba(52,211,153,0.1);
    color: var(--success);
  }

  /* Fill Area */
  .qg-fill-area {
    display: flex; gap: 10px; justify-content: center;
    flex-wrap: wrap; margin-top: 20px;
  }
  .qg-fill-input {
    width: 72px; height: 72px;
    border: 3px solid var(--rule);
    border-radius: var(--radius-sm);
    font-size: 1.8rem; font-weight: 900;
    text-align: center; color: var(--ink);
    background: white;
    font-family: inherit;
    transition: all 0.3s ease;
    outline: none;
  }
  .qg-fill-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(91,127,255,0.15);
    animation: qgPulse 1.5s infinite;
  }
  .qg-fill-input.correct { border-color: var(--success); background: rgba(52,211,153,0.08); color: var(--success); }
  .qg-fill-input.wrong { border-color: var(--error); background: rgba(248,113,113,0.06); color: var(--error); }
  .qg-fill-input.filled { border-color: var(--accent2); background: rgba(167,139,250,0.06); }

  .qg-submit-btn {
    margin-top: 24px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white; border: none;
    padding: 14px 48px; border-radius: 30px;
    font-size: 1.1rem; font-weight: 700;
    cursor: pointer; font-family: inherit;
    transition: all 0.3s ease;
    box-shadow: 0 4px 16px rgba(91,127,255,0.3);
  }
  .qg-submit-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(91,127,255,0.4); }
  .qg-submit-btn:active { transform: translateY(0); }
  .qg-submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Explanation Box */
  .qg-explanation-box {
    margin-top: 20px; padding: 16px 20px;
    background: rgba(167,139,250,0.08);
    border-left: 4px solid var(--accent2);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    font-size: 0.9rem; line-height: 1.6;
    color: var(--ink); text-align: left;
    animation: qgSlideUp 0.4s ease;
  }
  .qg-explanation-box strong { color: var(--accent); }

  .qg-next-btn {
    margin-top: 24px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white; border: none;
    padding: 12px 40px; border-radius: 30px;
    font-size: 1rem; font-weight: 700;
    cursor: pointer; font-family: inherit;
    transition: all 0.3s ease;
    box-shadow: 0 4px 16px rgba(91,127,255,0.3);
    animation: qgSlideUp 0.4s ease 0.2s both;
  }
  .qg-next-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(91,127,255,0.4); }

  /* Combo Indicator */
  .qg-combo-indicator {
    position: fixed; top: 80px; right: 20px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white; padding: 8px 20px;
    border-radius: 20px; font-weight: 700;
    font-size: 0.9rem; z-index: 100;
    opacity: 0; transform: scale(0.5);
    transition: all 0.3s ease;
    box-shadow: 0 4px 12px rgba(91,127,255,0.3);
  }
  .qg-combo-indicator.show {
    opacity: 1; transform: scale(1);
    animation: qgPulse 0.5s ease;
  }

  /* Result Card */
  .qg-result-card {
    background: var(--card);
    backdrop-filter: blur(12px);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid rgba(167,139,250,0.15);
    padding: 40px 32px;
    width: 100%; max-width: 500px;
    text-align: center;
    animation: qgBounceIn 0.6s ease;
  }
  .qg-result-emoji { font-size: 4rem; margin-bottom: 16px; animation: qgBounceIn 0.8s ease 0.3s both; }
  .qg-result-title {
    font-size: 1.8rem; font-weight: 900; margin-bottom: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .qg-result-subtitle { font-size: 1rem; color: var(--muted); margin-bottom: 28px; }
  .qg-result-stats {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 16px; margin-bottom: 28px;
  }
  .qg-stat-item {
    padding: 16px 8px;
    background: var(--bg2);
    border-radius: var(--radius-sm);
  }
  .qg-stat-value {
    font-size: 1.8rem; font-weight: 900;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .qg-stat-label { font-size: 0.78rem; color: var(--muted); margin-top: 4px; }

  /* Stars Rating */
  .qg-stars-rating {
    display: flex; justify-content: center; gap: 8px;
    margin-bottom: 24px;
  }
  .qg-star {
    font-size: 2.4rem; opacity: 0.2;
    transition: all 0.3s ease;
    animation: qgBounceIn 0.5s ease both;
  }
  .qg-star:nth-child(1) { animation-delay: 0.5s; }
  .qg-star:nth-child(2) { animation-delay: 0.7s; }
  .qg-star:nth-child(3) { animation-delay: 0.9s; }
  .qg-star.active { opacity: 1; transform: scale(1.1); }

  .qg-result-actions {
    display: flex; gap: 12px; justify-content: center;
  }

  /* Responsive */
  @media (max-width: 640px) {
    .qg-menu-title { font-size: 2.2rem; letter-spacing: 2px; }
    .qg-menu-subtitle { font-size: 0.95rem; }
    .qg-mode-grid { grid-template-columns: 1fr; gap: 12px; }
    .qg-mode-card { padding: 18px 14px; }
    .qg-mode-icon { font-size: 2.2rem; }
    .qg-question-card { padding: 24px 18px; }
    .qg-question-text { font-size: 1.25rem; }
    .qg-options-grid { grid-template-columns: 1fr; }
    .qg-result-stats { grid-template-columns: 1fr; gap: 10px; }
    .qg-game-header { flex-wrap: wrap; gap: 8px; justify-content: center; }
    .qg-fill-input { width: 60px; height: 60px; font-size: 1.5rem; }
  }
</style>
</head>
<body>

<div class="particles" id="particles"></div>
<div class="toast" id="toast"></div>

<!-- HEADER -->
<header class="app-header">
  <div class="app-logo">
    <div class="app-logo-icon">🏫</div>
    <div>
      <div class="app-logo-text">课堂小助手</div>
      <div class="app-logo-sub">三年级语文教学工具</div>
    </div>
  </div>
  <a href="chinese-interactive.html" style="display:inline-flex;align-items:center;gap:6px;padding:8px 20px;border-radius:20px;background:var(--bg2);color:var(--accent);font-size:0.85rem;font-weight:700;text-decoration:none;border:2px solid var(--rule);transition:all 0.3s;" onmouseover="this.style.borderColor='var(--accent)';this.style.transform='translateY(-2px)'" onmouseout="this.style.borderColor='var(--rule)';this.style.transform='none'">📖 语文互动乐园（19个游戏）</a>
</header>

<!-- NAV -->
<nav class="nav-tabs">
  <button class="nav-tab active" onclick="switchPanel('rollcall')"><span class="nav-tab-icon">🎲</span>随机点名</button>
  <button class="nav-tab" onclick="switchPanel('timer')"><span class="nav-tab-icon">⏱️</span>课堂计时</button>
  <button class="nav-tab" onclick="switchPanel('scoreboard')"><span class="nav-tab-icon">🏆</span>小组计分</button>
  <button class="nav-tab" onclick="switchPanel('wheel')"><span class="nav-tab-icon">🎰</span>课堂转盘</button>

  <button class="nav-tab" onclick="switchPanel('game')"><span class="nav-tab-icon">📊</span>学习记录</button>
</nav>

<!-- MAIN -->
<div class="main-area">

  <!-- ==================== ROLL CALL ==================== -->
  <div class="panel active" id="panel-rollcall">
    <div class="card">
      <div class="rollcall-display" id="rollcallDisplay">
        <div class="rollcall-ring" id="rollcallRing"></div>
        <div class="rollcall-name" id="rollcallName">准备就绪</div>

<script>
// ===== AUDIO =====
var audioCtx = null;
function getACtx() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }
function playSound(type) {
  try {
    var ctx = getACtx();
    if (type === 'tick') {
      var o = ctx.createOscillator(); var g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      g.gain.value = 0.06; o.frequency.value = 600 + Math.random() * 400;
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
      o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.05);
    } else if (type === 'reveal') {
      [523, 659, 784].forEach(function(f, i) {
        var o = ctx.createOscillator(); var g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        g.gain.value = 0.12; o.frequency.value = f;
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.12 + 0.25);
        o.start(ctx.currentTime + i*0.12); o.stop(ctx.currentTime + i*0.12 + 0.25);
      });
    } else if (type === 'ding') {
      var o = ctx.createOscillator(); var g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      g.gain.value = 0.15; o.frequency.value = 880;
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
      o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.5);
    } else if (type === 'alarm') {
      for (var i = 0; i < 3; i++) {
        var o = ctx.createOscillator(); var g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        g.gain.value = 0.2; o.frequency.value = i % 2 === 0 ? 800 : 600;
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.3 + 0.25);
        o.start(ctx.currentTime + i*0.3); o.stop(ctx.currentTime + i*0.3 + 0.25);
      }
    } else if (type === 'click') {
      var o = ctx.createOscillator(); var g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      g.gain.value = 0.08; o.frequency.value = 700;
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.06);
      o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.06);
    } else if (type === 'correct') {
      var o = ctx.createOscillator(); var g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      g.gain.value = 0.15;
      o.frequency.setValueAtTime(523, ctx.currentTime);
      o.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
      o.frequency.setValueAtTime(784, ctx.currentTime + 0.2);
      g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
      o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.4);
    } else if (type === 'wrong') {
      var o = ctx.createOscillator(); var g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      g.gain.value = 0.15;
      o.frequency.setValueAtTime(330, ctx.currentTime);
      o.frequency.setValueAtTime(262, ctx.currentTime + 0.15);
      g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
      o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.3);
    } else if (type === 'win') {
      [523, 659, 784, 1047].forEach(function(freq, i) {
        var o = ctx.createOscillator(); var g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        g.gain.value = 0.12;
        o.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.15);
        g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + i * 0.15 + 0.3);
        o.start(ctx.currentTime + i * 0.15); o.stop(ctx.currentTime + i * 0.15 + 0.3);
      });
    }
  } catch(e) {}
}

// ================================================================
// 1. RANDOM ROLL CALL
// ================================================================
var defaultNames = [
  '张小明','李华','王芳','赵强','刘洋','陈思雨','杨浩','黄丽娟',
  '周文博','吴佳琪','郑宇轩','孙悦','马天翔','朱晓东','林美琪','何俊杰',
  '高雨萱','罗志远','谢诗涵','韩子涵','唐嘉怡','曹明辉','邓雅文','萧然',
  '许思源','冯雨晴','曾子墨','彭博文','方若曦','程浩宇'
];
var names = defaultNames.slice();
var rollcallInterval = null;
var isRolling = false;
var rollcallHistory = [];

(function initNames() {
  var saved = localStorage.getItem('classroom_names');
  if (saved) {
    try { names = JSON.parse(saved); } catch(e) { names = defaultNames.slice(); }
  }
  updateNameTextarea();
})();

function updateNameTextarea() {
  document.getElementById('nameTextarea').value = names.join('\n');
  document.getElementById('nameCount').textContent = '共 ' + names.length + ' 名学生';
}

function toggleNameEditor() {
  var toggle = document.getElementById('editorToggle');
  var body = document.getElementById('editorBody');
  toggle.classList.toggle('open');
  body.classList.toggle('show');
}

function saveNames() {
  var text = document.getElementById('nameTextarea').value;
  names = text.split('\n').map(function(n) { return n.trim(); }).filter(function(n) { return n.length > 0; });
  localStorage.setItem('classroom_names', JSON.stringify(names));
  updateNameTextarea();
  showToast('名单已保存（' + names.length + ' 人）', 'success');
  playSound('ding');
}

function loadSampleNames() {
  names = defaultNames.slice();
  updateNameTextarea();
  showToast('已加载示例名单', 'info');
}

function parseImportText(text) {
  var lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
  var result = [];
  lines.forEach(function(line) {
    // Split by comma, tab, semicolon, or chinese comma
    var cells = line.split(/[,\t;，；]/);
    cells.forEach(function(cell) {
      var name = cell.replace(/"/g, '').trim();
      if (name.length > 0 && name.length <= 20) {
        result.push(name);
      }
    });
  });
  return result;
}

function handleImportFile(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    var imported = parseImportText(ev.target.result);
    if (imported.length === 0) {
      showToast('未识别到有效姓名', 'error');
      return;
    }
    names = imported;
    updateNameTextarea();
    playSound('ding');
    showToast('已导入 ' + names.length + ' 名学生', 'success');
  };
  reader.readAsText(file, 'UTF-8');
  // Reset so same file can be re-imported
  e.target.value = '';
}

function handlePasteImport() {
  if (navigator.clipboard && navigator.clipboard.readText) {
    navigator.clipboard.readText().then(function(text) {
      applyPastedText(text);
    }).catch(function() {
      showPasteFallback();
    });
  } else {
    showPasteFallback();
  }
}

function showPasteFallback() {
  var current = document.getElementById('nameTextarea').value;
  // Append instruction to textarea
  document.getElementById('nameTextarea').value = current + (current ? '\n' : '') + '--- 在此粘贴名单，然后点击"保存名单"即可 ---\n';
  document.getElementById('nameTextarea').focus();
  showToast('请直接在文本框中粘贴，然后保存', 'info');
}

function applyPastedText(text) {
  var imported = parseImportText(text);
  if (imported.length === 0) {
    showToast('剪贴板中未识别到有效姓名', 'error');
    return;
  }
  names = imported;
  updateNameTextarea();
  playSound('ding');
  showToast('已从剪贴板导入 ' + names.length + ' 名学生', 'success');
}

function toggleRollCall() {
  if (names.length === 0) { showToast('请先添加学生名单', 'error'); return; }
  if (isRolling) { stopRollCall(); } else { startRollCall(); }
}

function startRollCall() {
  isRolling = true;
  var btn = document.getElementById('rollcallBtn');
  btn.innerHTML = '⏹ 停止';
  btn.classList.remove('btn-primary');
  btn.classList.add('btn-danger');

  var nameEl = document.getElementById('rollcallName');
  var hintEl = document.getElementById('rollcallHint');
  nameEl.classList.add('rolling');
  nameEl.classList.remove('revealed');
  hintEl.textContent = '点击停止选取学生...';

  var speed = 50;
  function roll() {
    var idx = Math.floor(Math.random() * names.length);
    nameEl.textContent = names[idx];
    playSound('tick');
    if (isRolling) {
      rollcallInterval = setTimeout(roll, speed);
    }
  }
  roll();
}

function stopRollCall() {
  isRolling = false;
  clearTimeout(rollcallInterval);

  var btn = document.getElementById('rollcallBtn');
  btn.innerHTML = '🎲 开始点名';
  btn.classList.remove('btn-danger');
  btn.classList.add('btn-primary');

  var nameEl = document.getElementById('rollcallName');
  var hintEl = document.getElementById('rollcallHint');
  var ring = document.getElementById('rollcallRing');

  // Final pick
  var idx = Math.floor(Math.random() * names.length);
  var picked = names[idx];

  nameEl.classList.remove('rolling');

var timer = {
  mode: 'countdown', // countdown | stopwatch
  total: 300,
  remaining: 300,
  elapsed: 0,
  running: false,
  interval: null
};

function setTimerMode(mode) {
  resetTimer();
  timer.mode = mode;
  document.getElementById('modeCountdown').classList.toggle('active', mode === 'countdown');
  document.getElementById('modeStopwatch').classList.toggle('active', mode === 'stopwatch');
  document.getElementById('timerPresets').style.display = mode === 'countdown' ? 'flex' : 'none';
  document.getElementById('customTimeRow').style.display = mode === 'countdown' ? 'flex' : 'none';
  document.getElementById('timerLabel').textContent = mode === 'countdown' ? '准备开始' : '准备计时';
  updateTimerDisplay();
  playSound('click');
}

function setPresetTime(sec) {
  timer.total = sec; timer.remaining = sec;
  document.querySelectorAll('.preset-btn').forEach(function(b) { b.classList.remove('active'); });
  event.currentTarget.classList.add('active');
  updateTimerDisplay();
  playSound('click');
}

function applyCustomTime() {
  var m = parseInt(document.getElementById('customMin').value) || 0;
  var s = parseInt(document.getElementById('customSec').value) || 0;
  var total = m * 60 + s;
  if (total <= 0) { showToast('请输入有效时间', 'error'); return; }
  timer.total = total; timer.remaining = total;
  document.querySelectorAll('.preset-btn').forEach(function(b) { b.classList.remove('active'); });
  updateTimerDisplay();
  showToast('已设置 ' + m + ' 分 ' + s + ' 秒', 'info');
  playSound('click');
}

function updateTimerDisplay() {
  var display = document.getElementById('timerDisplay');
  var circle = document.getElementById('timerCircle');
  var circumference = 2 * Math.PI * 88; // ~553
  var t;
  if (timer.mode === 'countdown') {
    t = timer.remaining;
    var pct = timer.total > 0 ? timer.remaining / timer.total : 1;
    circle.style.strokeDashoffset = circumference * (1 - pct);
    display.className = 'timer-display';
    if (pct < 0.1 && timer.running) display.classList.add('danger');
    else if (pct < 0.3 && timer.running) display.classList.add('warning');
  } else {
    t = timer.elapsed;
    circle.style.strokeDashoffset = 0;
    display.className = 'timer-display';
  }
  var m = Math.floor(t / 60);
  var s = t % 60;
  display.textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

function toggleTimer() {
  if (timer.running) { pauseTimer(); } else { startTimer(); }
}

function startTimer() {
  if (timer.mode === 'countdown' && timer.remaining <= 0) {
    timer.remaining = timer.total;
  }
  timer.running = true;
  var btn = document.getElementById('timerStartBtn');
  btn.innerHTML = '⏸ 暂停';
  document.getElementById('timerLabel').textContent = timer.mode === 'countdown' ? '计时中...' : '计时中...';
  playSound('click');

  timer.interval = setInterval(function() {
    if (timer.mode === 'countdown') {
      timer.remaining--;
      if (timer.remaining <= 0) {
        timer.remaining = 0;
        pauseTimer();
        timerFinished();
      }
    } else {
      timer.elapsed++;
    }
    updateTimerDisplay();
  }, 1000);
}

function pauseTimer() {
  timer.running = false;
  clearInterval(timer.interval);
  var btn = document.getElementById('timerStartBtn');
  btn.innerHTML = '▶ 继续';
  document.getElementById('timerLabel').textContent = '已暂停';
  playSound('click');
}

function resetTimer() {
  timer.running = false;
  clearInterval(timer.interval);
  timer.remaining = timer.total;
  timer.elapsed = 0;
  var btn = document.getElementById('timerStartBtn');
  btn.innerHTML = '▶ 开始';
  btn.disabled = false;
  document.getElementById('timerLabel').textContent = timer.mode === 'countdown' ? '准备开始' : '准备计时';
  var circle = document.getElementById('timerCircle');
  circle.style.strokeDashoffset = 0;
  updateTimerDisplay();
}

function timerFinished() {
  playSound('alarm');
  createConfetti(40);
  showToast('⏰ 时间到！', 'info');
  document.getElementById('timerLabel').textContent = '时间到！';
  var btn = document.getElementById('timerStartBtn');
  btn.innerHTML = '▶ 开始';

  // Flash effect
  var display = document.getElementById('timerDisplay');
  var count = 0;
  var flash = setInterval(function() {
    display.style.opacity = count % 2 === 0 ? '0.3' : '1';
    count++;
    if (count >= 8) { clearInterval(flash); display.style.opacity = '1'; }
  }, 300);
}

var groups = [];
var groupColors = ['#5B7FFF','#A78BFA','#34D399','#FBBF24','#F87171','#FB923C','#38BDF8','#E879F9'];

function rebuildGroups() {
  var count = parseInt(document.getElementById('groupCountInput').value) || 4;
  count = Math.max(2, Math.min(8, count));
  document.getElementById('groupCountInput').value = count;

  var oldScores = {};
  groups.forEach(function(g) { oldScores[g.name] = g.score; });

  groups = [];
  for (var i = 0; i < count; i++) {
    var name = '第 ' + (i+1) + ' 组';
    groups.push({
      name: name,
      score: oldScores[name] || 0,
      color: groupColors[i % groupColors.length]
    });
  }
  renderScoreboard();
  playSound('click');
}

function renderScoreboard() {
  var grid = document.getElementById('scoreboardGrid');
  // Sort by score for rank
  var sorted = groups.slice().sort(function(a, b) { return b.score - a.score; });
  var rankMap = {};
  sorted.forEach(function(g, i) { rankMap[g.name] = i + 1; });

  var html = '';
  groups.forEach(function(g, idx) {
    var rank = rankMap[g.name];
    var isFirst = rank === 1 && g.score > 0;
    html += '<div class="group-card' + (isFirst ? ' first' : '') + '" style="animation-delay:' + (idx*0.08) + 's">';
    if (g.score > 0 || groups.length > 2) {
      html += '<div class="group-rank">' + rank + '</div>';
    }
    html += '<input class="group-name-input" value="' + g.name + '" onchange="renameGroup(' + idx + ', this.value)">';
    html += '<div class="group-score" id="gscore-' + idx + '">' + g.score + '</div>';
    html += '<div class="group-btns">';
    html += '<button class="group-btn minus5" onclick="changeScore(' + idx + ',-5)" title="-5">-5</button>';
    html += '<button class="group-btn minus" onclick="changeScore(' + idx + ',-1)" title="-1">-1</button>';
    html += '<button class="group-btn plus" onclick="changeScore(' + idx + ',1)" title="+1">+1</button>';
    html += '<button class="group-btn plus5" onclick="changeScore(' + idx + ',5)" title="+5">+5</button>';
    html += '</div></div>';
  });
  grid.innerHTML = html;
}

function changeScore(idx, delta) {
  groups[idx].score += delta;
  if (groups[idx].score < 0) groups[idx].score = 0;

  var scoreEl = document.getElementById('gscore-' + idx);
  scoreEl.textContent = groups[idx].score;
  scoreEl.classList.remove('bump');
  void scoreEl.offsetWidth;
  scoreEl.classList.add('bump');

  // Float popup
  var card = scoreEl.closest('.group-card');
  var popup = document.createElement('div');
  popup.className = 'score-popup';
  popup.style.color = delta > 0 ? 'var(--success)' : 'var(--error)';
  popup.textContent = (delta > 0 ? '+' : '') + delta;
  card.appendChild(popup);
  setTimeout(function() { popup.remove(); }, 1000);

  if (delta > 0) playSound('click');
  else playSound('tick');

  renderScoreboard();
}

function renameGroup(idx, name) {
  groups[idx].name = name;
  renderScoreboard();
}

function resetAllScores() {
  groups.forEach(function(g) { g.score = 0; });
  renderScoreboard();
  showToast('全部分数已清零', 'info');
  playSound('click');
}

function shuffleGroups() {
  for (var i = groups.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = groups[i]; groups[i] = groups[j]; groups[j] = t;
  }
  renderScoreboard();
  showToast('已随机排序', 'info');
  playSound('click');
}

function exportScores() {
  var sorted = groups.slice().sort(function(a, b) { return b.score - a.score; });
  var text = '🏆 小组排名\n' + '─'.repeat(20) + '\n';
  sorted.forEach(function(g, i) {
    text += '第' + (i+1) + '名：' + g.name + ' - ' + g.score + '分\n';
  });
  navigator.clipboard.writeText(text).then(function() {
    showToast('排名已复制到剪贴板', 'success');
  }).catch(function() {
    showToast('复制失败，请手动复制', 'error');
  });
  playSound('click');
}

  { text: '当小老师', color: '#34D399' },

  { text: '讲个笑话', color: '#38BDF8' },
  { text: '神秘礼物', color: '#E879F9' }
];
var wheelSpinning = false;
var currentRotation = 0;

function drawWheel() {
  var canvas = document.getElementById('wheelCanvas');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var cx = 210, cy = 210, r = 200;
  var n = wheelOptions.length;
  if (n === 0) {
    ctx.clearRect(0, 0, 420, 420);
    ctx.fillStyle = '#D4DDEF';
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#8896AB'; ctx.font = '18px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('请添加选项', cx, cy);
    return;
  }
  var arc = (Math.PI * 2) / n;

  ctx.clearRect(0, 0, 420, 420);

  for (var i = 0; i < n; i++) {
    var startAngle = i * arc - Math.PI / 2;
    var endAngle = startAngle + arc;

    // Segment
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, startAngle, endAngle);
    ctx.closePath();
    ctx.fillStyle = wheelOptions[i].color;
    ctx.fill();

    // Border
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Text
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(startAngle + arc / 2);
    ctx.fillStyle = 'white';
    ctx.font = 'bold ' + (n > 10 ? '13' : n > 6 ? '14' : '16') + 'px "Noto Sans CJK SC", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,0.3)';
    ctx.shadowBlur = 3;
    ctx.fillText(wheelOptions[i].text, r * 0.62, 0);
    ctx.restore();
  }
}

function spinWheel() {
  if (wheelSpinning || wheelOptions.length === 0) return;
  wheelSpinning = true;
  playSound('click');

  var canvas = document.getElementById('wheelCanvas');
  var extraSpins = 5 + Math.floor(Math.random() * 3); // 5-7 full spins
  var randomAngle = Math.random() * 360;
  var totalRotation = extraSpins * 360 + randomAngle;

  currentRotation += totalRotation;
  canvas.style.transform = 'rotate(' + currentRotation + 'deg)';

  document.getElementById('wheelResult').textContent = '';
  document.getElementById('wheelResult').classList.remove('revealed');

  setTimeout(function() {
    wheelSpinning = false;
    // Calculate which segment is at top
    var normalizedAngle = currentRotation % 360;
    var pointerAngle = (360 - normalizedAngle + 360) % 360; // pointer at top (0°)
    var n = wheelOptions.length;
    var arc = 360 / n;
    var idx = Math.floor(pointerAngle / arc) % n;

    var result = wheelOptions[idx].text;
    document.getElementById('wheelResult').textContent = '🎉 ' + result + ' 🎉';
    document.getElementById('wheelResult').classList.add('revealed');

    playSound('reveal');
    createConfetti(30);
  }, 4200);
}

function renderLearningRecords() {
  var container = document.getElementById('record-content');
  if (!container) return;

  var history = [];
  try { history = JSON.parse(localStorage.getItem('chinese_game_history')) || []; } catch(e) { history = []; }

  if (history.length === 0) {
    container.innerHTML =
      '<div class="record-empty">' +
        '<div class="record-empty-icon">🎮</div>' +
        '<div class="record-empty-text">还没有玩过游戏哦</div>' +
        '<a href="../chinese-interactive.html" class="btn btn-primary">去玩一玩</a>' +
      '</div>';
    return;
  }

  // 按时间倒序排列
  history.sort(function(a, b) { return (b.timestamp || 0) - (a.timestamp || 0); });

  // 统计
  var totalGames = history.length;
  var totalCorrect = 0;
  var bestModule = '';
  var bestScore = -1;
  history.forEach(function(r) {
    totalCorrect += r.correct || 0;
    if (r.score > bestScore) { bestScore = r.score; bestModule = r.moduleName || ''; }
  });

  var html = '';
  html += '<div class="record-stats">';
  html += '<div class="record-stat-card"><div class="record-stat-value">' + totalGames + '</div><div class="record-stat-label">总游戏次数</div></div>';
  html += '<div class="record-stat-card"><div class="record-stat-value">' + totalCorrect + '</div><div class="record-stat-label">总正确数</div></div>';
  html += '<div class="record-stat-card"><div class="record-stat-value" style="font-size:1rem;">' + bestModule + '</div><div class="record-stat-label">最高得分模块</div></div>';
  html += '</div>';

  html += '<div class="record-list">';
  var recent = history.slice(0, 10);
  recent.forEach(function(r, i) {
    html += '<div class="record-item" style="animation-delay:' + (i * 0.06) + 's">';
    html += '<div class="record-item-info">';
    html += '<div class="record-item-module">' + (r.moduleName || '未知') + '</div>';
    html += '<div class="record-item-meta">' + (r.categoryName || '') + '</div>';
    html += '</div>';
    html += '<div class="record-item-score">' + (r.correct || 0) + '/' + (r.total || 0) + '</div>';
    html += '<div class="record-item-time">' + (r.time || '') + '</div>';
    html += '<div class="record-item-action"><a href="../chinese-interactive.html" class="btn btn-secondary btn-sm">再玩一次</a></div>';
    html += '</div>';
  });
  html += '</div>';

  container.innerHTML = html;
}

    { q: '一（  ）星星', a: '颗', options: ['颗','棵','克','客'], hint: '"颗"用来数细小圆润的东西。' },
    { q: '____地跑', a: '飞快', options: ['飞快','碧绿','安静','高兴'], hint: '修饰"跑"要用表示速度的词。' },
    { q: '____地说', a: '高兴', options: ['高兴','飞快','美丽','勇敢'], hint: '修饰"说"要用表示心情的词。' },
    { q: '____的小溪', a: '清澈', options: ['清澈','碧绿','火红','明亮'], hint: '"清澈"形容水干净透明，能看见底。' },
    { q: '一（  ）小河', a: '条', options: ['条','棵','颗','朵'], hint: '"条"用来数长条形的东西。' },
    { q: '一（  ）花', a: '朵', options: ['朵','条','棵','颗'], hint: '"朵"用来数花、云等东西。' },
    { q: '____地唱歌', a: '欢快', options: ['欢快','飞快','清澈','碧绿'], hint: '唱歌是一种快乐的事，用什么词修饰呢？' },
    { q: '____的校园', a: '美丽', options: ['美丽','飞快','清澈','勇敢'], hint: '校园又漂亮又整洁，用什么词形容好呢？' },

function QGShuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function QGEscapeHtml(str) {
  return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

function QGGetTimerTime() {
  if (QGState.difficulty === 'easy') return 20;
  if (QGState.difficulty === 'medium') return 15;
  return 10;
}

function QGGetQuestionCount() {
  if (QGState.difficulty === 'easy') return 8;
  if (QGState.difficulty === 'medium') return 10;
  return 12;
}

function QGGetScoreBase() {
  if (QGState.difficulty === 'easy') return 10;
  if (QGState.difficulty === 'medium') return 15;
  return 20;
}

function QGSetDifficulty(d) {
  QGState.difficulty = d;
  document.querySelectorAll('.qg-diff-btn').forEach(function(btn) {
    btn.classList.remove('active');
    if (btn.textContent === (d === 'easy' ? '初级' : d === 'medium' ? '中级' : '高级')) {
      btn.classList.add('active');
    }
  });
  playSound('click');
}

function QGShowScreen(id) {
  var screens = document.querySelectorAll('.qg-screen');
  screens.forEach(function(s) { s.classList.remove('active'); });
  document.getElementById('qg-screen-' + id).classList.add('active');
}

function QGStartGame(mode) {
  playSound('click');
  QGState.mode = mode;
  QGState.score = 0;
  QGState.lives = 3;
  QGState.currentQ = 0;
  QGState.combo = 0;
  QGState.maxCombo = 0;
  QGState.correctCount = 0;
  QGState.totalQ = QGGetQuestionCount();
  QGState.maxTime = QGGetTimerTime();
  QGState.answered = false;

  var bank = QGShuffle(QGQuestionBank[mode]);
  QGState.questions = bank.slice(0, QGState.totalQ);

  document.getElementById('qg-modeLabel').textContent = QGModeLabels[mode];
  QGUpdateScoreDisplay();
  QGUpdateLivesDisplay();
  QGShowScreen('game');
  QGRenderQuestion();
}

function QGRenderQuestion() {
  if (QGState.currentQ >= QGState.totalQ || QGState.lives <= 0) {
    QGEndGame();
    return;
  }

  QGState.answered = false;
  var q = QGState.questions[QGState.currentQ];
  var area = document.getElementById('qg-questionArea');

  var pct = (QGState.currentQ / QGState.totalQ) * 100;
  document.getElementById('qg-progressFill').style.width = pct + '%';

  var html = '<div class="qg-question-card">';

  if (QGState.mode === 'idiom') {
    html += '<span class="qg-question-type">📖 成语填空</span>';
    html += '<div class="qg-question-text">' + q.q + '</div>';
    var blankCount = (q.a.match(/[^\s]/g) || []).length;
    html += '<div class="qg-fill-area" id="qg-fillArea">';
    for (var i = 0; i < blankCount; i++) {
      html += '<input class="qg-fill-input" type="text" maxlength="1" data-index="' + i + '" autocomplete="off">';
    }
    html += '</div>';
    html += '<button class="qg-submit-btn" onclick="QGCheckFillAnswer()">确认</button>';
  } else if (QGState.mode === 'poem') {
    html += '<span class="qg-question-type">🌙 古诗词对答</span>';
    html += '<div class="qg-question-text">' + q.q + '</div>';
    html += '<div class="qg-options-grid">';
    var shuffled = QGShuffle(q.options);
    for (var i = 0; i < shuffled.length; i++) {
      html += '<button class="qg-option-btn" onclick="QGCheckOption(this, \'' + QGEscapeHtml(shuffled[i]) + '\', \'' + QGEscapeHtml(q.a) + '\')">' + shuffled[i] + '</button>';
    }
    html += '</div>';
  } else if (QGState.mode === 'character') {
    html += '<span class="qg-question-type">✍️ 汉字辨析</span>';
    html += '<div class="qg-question-text">' + q.q + '</div>';
    html += '<div class="qg-options-grid">';
    var shuffled = QGShuffle(q.options);
    for (var i = 0; i < shuffled.length; i++) {
      html += '<button class="qg-option-btn" onclick="QGCheckOption(this, \'' + QGEscapeHtml(shuffled[i]) + '\', \'' + QGEscapeHtml(q.a) + '\')">' + shuffled[i] + '</button>';
    }
    html += '</div>';
  } else if (QGState.mode === 'word') {
    html += '<span class="qg-question-type">🧩 词语搭配</span>';
    html += '<div class="qg-question-text">' + q.q + '</div>';
    html += '<div class="qg-options-grid">';
    var shuffled = QGShuffle(q.options);
    for (var i = 0; i < shuffled.length; i++) {
      html += '<button class="qg-option-btn" onclick="QGCheckOption(this, \'' + QGEscapeHtml(shuffled[i]) + '\', \'' + QGEscapeHtml(q.a) + '\')">' + shuffled[i] + '</button>';
    }
    html += '</div>';
  }

  html += '</div>';
  area.innerHTML = html;

  if (QGState.mode === 'idiom') {
    var inputs = document.querySelectorAll('.qg-fill-input');
    if (inputs.length > 0) inputs[0].focus();
    inputs.forEach(function(input, idx) {
      input.addEventListener('input', function() {
        if (this.value.length === 1 && idx < inputs.length - 1) {
          inputs[idx + 1].focus();
        }
        this.classList.toggle('filled', this.value.length > 0);
      });
      input.addEventListener('keydown', function(e) {
        if (e.key === 'Backspace' && this.value === '' && idx > 0) {
          inputs[idx - 1].focus();
        }
        if (e.key === 'Enter') { QGCheckFillAnswer(); }
      });
    });
  }

  QGStartTimer();
}

function QGCheckOption(btn, selected, correct) {
  if (QGState.answered) return;
  QGState.answered = true;
  QGStopTimer();

  var isCorrect = (selected === correct);
  var allBtns = document.querySelectorAll('.qg-option-btn');

  if (isCorrect) {
    btn.classList.add('correct');
    QGHandleCorrect(allBtns, correct);
  } else {
    btn.classList.add('wrong');
    QGHandleWrong(allBtns, correct);
  }

  allBtns.forEach(function(b) { b.classList.add('disabled'); });

  QGShowExplanation(isCorrect);
}

function QGCheckFillAnswer() {
  if (QGState.answered) return;
  QGState.answered = true;
  QGStopTimer();

  var inputs = document.querySelectorAll('.qg-fill-input');
  var userAnswer = '';
  inputs.forEach(function(inp) { userAnswer += inp.value; });

  var q = QGState.questions[QGState.currentQ];
  var isCorrect = (userAnswer === q.a);

  if (isCorrect) {
    inputs.forEach(function(inp) { inp.classList.add('correct'); });
    QGHandleCorrect(null, q.a);
  } else {
    inputs.forEach(function(inp) {
      var idx = parseInt(inp.dataset.index);
      if (inp.value === q.a[idx]) {
        inp.classList.add('correct');
      } else {
        inp.classList.add('wrong');
      }
    });
    QGHandleWrong(null, q.a);
  }

  inputs.forEach(function(inp) { inp.disabled = true; });
  var submitBtn = document.querySelector('.qg-submit-btn');
  if (submitBtn) submitBtn.disabled = true;

  QGShowExplanation(isCorrect);
}

function QGHandleCorrect(allBtns, correctAnswer) {
  QGState.combo++;
  if (QGState.combo > QGState.maxCombo) QGState.maxCombo = QGState.combo;
  QGState.correctCount++;

  var bonus = QGState.combo >= 3 ? 5 : 0;
  var timeBonus = Math.floor(QGState.timeLeft / QGState.maxTime * 5);
  var points = QGGetScoreBase() + bonus + timeBonus;
  QGState.score += points;

  playSound('correct');
  showToast('✅ +' + points + ' 分！', 'success');
  QGShowCombo(QGState.combo);
  QGUpdateScoreDisplay();
}

function QGHandleWrong(allBtns, correctAnswer) {
  QGState.combo = 0;
  QGState.lives--;

  playSound('wrong');
  showToast('❌ 正确答案：' + correctAnswer, 'error');
  QGUpdateLivesDisplay();

  if (allBtns) {
    allBtns.forEach(function(b) {
      if (b.textContent === correctAnswer) b.classList.add('show-correct');
    });
  }
}

function QGShowCombo(count) {
  var el = document.getElementById('qg-comboIndicator');
  if (count >= 2) {
    el.textContent = '🔥 连对 ' + count + ' 题！';
    el.classList.add('show');
    setTimeout(function() { el.classList.remove('show'); }, 1500);
  }
}

function QGShowExplanation(isCorrect) {
  var q = QGState.questions[QGState.currentQ];
  var area = document.getElementById('qg-questionArea');
  var card = area.querySelector('.qg-question-card');

  var html = '<div class="qg-explanation-box">';
  html += '<strong>' + (isCorrect ? '👍 回答正确！' : '💡 正确答案是：' + q.a) + '</strong><br>';
  html += q.hint;
  html += '</div>';
  html += '<button class="qg-next-btn" onclick="QGNextQuestion()">' +
    (QGState.currentQ < QGState.totalQ - 1 && QGState.lives > 0 ? '下一题 →' : '查看结果') + '</button>';

  card.insertAdjacentHTML('beforeend', html);
}

function QGNextQuestion() {
  playSound('click');
  QGState.currentQ++;
  QGRenderQuestion();
}

function QGStartTimer() {
  QGState.timeLeft = QGState.maxTime;
  var fill = document.getElementById('qg-timerFill');
  fill.style.width = '100%';
  fill.className = 'qg-timer-fill';

  if (QGState.timerInterval) clearInterval(QGState.timerInterval);
  QGState.timerInterval = setInterval(function() {
    QGState.timeLeft -= 0.1;
    if (QGState.timeLeft <= 0) {
      QGState.timeLeft = 0;
      QGStopTimer();
      if (!QGState.answered) QGTimeUp();
    }
    var pct = (QGState.timeLeft / QGState.maxTime) * 100;
    fill.style.width = pct + '%';
    fill.className = 'qg-timer-fill';
    if (pct < 30) fill.classList.add('danger');
    else if (pct < 60) fill.classList.add('warning');
  }, 100);
}

function QGStopTimer() {
  if (QGState.timerInterval) {
    clearInterval(QGState.timerInterval);
    QGState.timerInterval = null;
  }
}

function QGTimeUp() {
  QGState.answered = true;
  var q = QGState.questions[QGState.currentQ];

  if (QGState.mode === 'idiom') {
    var inputs = document.querySelectorAll('.qg-fill-input');
    var chars = q.a.split('');
    inputs.forEach(function(inp, idx) {
      if (idx < chars.length) {
        inp.value = chars[idx];
        inp.classList.add('wrong');
      }
      inp.disabled = true;
    });
    var btn = document.querySelector('.qg-submit-btn');
    if (btn) btn.disabled = true;
  } else {
    var allBtns = document.querySelectorAll('.qg-option-btn');
    allBtns.forEach(function(b) {
      if (b.textContent === q.a) b.classList.add('show-correct');
      b.classList.add('disabled');
    });
  }

  QGHandleWrong(null, q.a);
  QGShowExplanation(false);
}

function QGUpdateScoreDisplay() {
  document.getElementById('qg-scoreDisplay').textContent = QGState.score;
}

function QGUpdateLivesDisplay() {
  var s = '';
  for (var i = 0; i < 3; i++) {
    s += i < QGState.lives ? '❤️' : '🤍';
  }
  document.getElementById('qg-livesDisplay').textContent = s;
}

function QGEndGame() {
  QGStopTimer();
  QGShowScreen('result');
  playSound('win');
  createConfetti(30);

  var pct = QGState.totalQ > 0 ? Math.round(QGState.correctCount / QGState.totalQ * 100) : 0;
  var stars = pct >= 90 ? 3 : pct >= 60 ? 2 : pct >= 30 ? 1 : 0;

  var emoji, title, subtitle;
  if (pct >= 90) { emoji = '🏆'; title = '太棒了！'; subtitle = '你是语文小达人！'; }
  else if (pct >= 70) { emoji = '🎉'; title = '真不错！'; subtitle = '继续努力，你会更棒的！'; }
  else if (pct >= 50) { emoji = '💪'; title = '加油哦！'; subtitle = '多练习就能进步！'; }
  else { emoji = '📖'; title = '别灰心！'; subtitle = '多读多练，下次一定行！'; }

  document.getElementById('qg-resultEmoji').textContent = emoji;
  document.getElementById('qg-resultTitle').textContent = title;
  document.getElementById('qg-resultSubtitle').textContent = subtitle;
  document.getElementById('qg-statScore').textContent = QGState.score;
  document.getElementById('qg-statCorrect').textContent = QGState.correctCount + '/' + QGState.totalQ;
  document.getElementById('qg-statCombo').textContent = QGState.maxCombo;

  var starEls = document.querySelectorAll('#qg-starsRating .qg-star');
  starEls.forEach(function(s, i) {
    s.classList.remove('active');
    if (i < stars) setTimeout(function() { s.classList.add('active'); playSound('correct'); }, 500 + i * 300);
  });

  // Save record to localStorage
  var now = new Date();
  var timeStr = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  var record = {
    moduleId: QGState.mode,
    moduleName: QGModeLabels[QGState.mode],
    categoryName: '语文大闯关',
    score: QGState.score,
    total: QGState.totalQ,
    correct: QGState.correctCount,
    time: timeStr,
    timestamp: Date.now()
  };
  var history = JSON.parse(localStorage.getItem('chinese_game_history') || '[]');
  history.unshift(record);
  if (history.length > 50) history = history.slice(0, 50);
  localStorage.setItem('chinese_game_history', JSON.stringify(history));
}

function QGBackToMenu() {
  playSound('click');
  QGStopTimer();
  QGShowScreen('menu');
}

function QGRestartGame() {
  playSound('click');
  QGStartGame(QGState.mode);
}
</script>
