  .modal-head {
    display: flex; align-items: center; justify-content: space-between;

  }

  .drop-zone {

  }
  .drop-zone::before { content:''; position:absolute; inset:0; background: radial-gradient(circle at center, rgba(139,92,246,0.04), transparent 70%); opacity:0; transition: opacity 0.4s; }
  .drop-zone:hover::before, .drop-zone.over::before { opacity:1; }

  .drop-zone .dz-icon { font-size: 3.2rem; margin-bottom: 12px; display: block; animation: float 3s ease-in-out infinite; filter: drop-shadow(0 0 12px rgba(139,92,246,0.4)); }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

  .import-prog { margin-top: 18px; display: none; }

  .imp-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: var(--radius-xs); transition: background 0.2s; }

  /* Edit field */
  .ed-body { display: flex; flex-direction: column; gap: 16px; }
  .ed-field label { display: block; font-size: 0.84rem; color: var(--muted); margin-bottom: 7px; font-weight: 500; }
  .ed-field input, .ed-field select {

  }
  .ed-field input:focus, .ed-field select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(139,92,246,0.1), 0 0 18px rgba(139,92,246,0.08); }
  .ed-field select option { background: var(--bg2); }

  /* ========== Toast ========== */
  .toast-box { position: fixed; top: 26px; right: 26px; z-index: 2000; display: flex; flex-direction: column; gap: 10px; }
  .toast {
    padding: 14px 20px; border-radius: var(--radius-sm);
    background: linear-gradient(135deg, var(--bg2), #1a1d35);
    border: 1px solid var(--glass-border); backdrop-filter: blur(16px);

    animation: toastIn 0.4s cubic-bezier(0.16,1,0.3,1); max-width: 360px;
  }
  .toast.out { animation: toastOut 0.3s ease forwards; }
  .toast-ok { border-left: 3px solid var(--success); }
  .toast-err { border-left: 3px solid var(--danger); }
  .toast-info { border-left: 3px solid var(--accent); }
  @keyframes toastIn { from{opacity:0;transform:translateX(40px) scale(0.92);filter:blur(4px)} to{opacity:1;transform:translateX(0) scale(1);filter:blur(0)} }
  @keyframes toastOut { from{opacity:1;transform:translateX(0)} to{opacity:0;transform:translateX(40px)} }

  /* Footer */
  .foot { text-align: center; padding: 40px 0 28px; color: var(--muted); font-size: 0.78rem; opacity: 0.5; }
  .foot span { background: linear-gradient(135deg, #a78bfa, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 7px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(139,92,246,0.18); border-radius: 4px; }

  /* Responsive */

    .title { font-size: 1.6rem; }

</style>
</head>

<script>
(function() {
  'use strict';
  var KEY = 'aionui_nav';
  var ICONS = ['📁','📂','🌐','💻','🎮','📚','🎨','🎵','📷','📰','🔧','💡','🛒','💰','📊','🏥','✈️','🌍','🔬','🎓','🏆','⭐','🔥','💎','🚀','🎭','🗓️','🏠','📱','🧩','🪐'];

  var DEFAULT = [
    { name: '常用工具', bookmarks: [
      { title: '百度', url: 'https://www.baidu.com' },
      { title: 'Google', url: 'https://www.google.com' },
      { title: 'GitHub', url: 'https://github.com' },
      { title: 'MDN Web Docs', url: 'https://developer.mozilla.org' },
      { title: 'Figma', url: 'https://www.figma.com' },
    ]},
    { name: '社交平台', bookmarks: [
      { title: '知乎', url: 'https://www.zhihu.com' },
      { title: '微博', url: 'https://weibo.com' },
      { title: '豆瓣', url: 'https://www.douban.com' },
      { title: '小红书', url: 'https://www.xiaohongshu.com' },
    ]},
    { name: '影音娱乐', bookmarks: [
      { title: '哔哩哔哩', url: 'https://www.bilibili.com' },
      { title: 'YouTube', url: 'https://www.youtube.com' },
      { title: '网易云音乐', url: 'https://music.163.com' },
    ]},
    { name: '购物商城', bookmarks: [
      { title: '淘宝', url: 'https://www.taobao.com' },
      { title: '京东', url: 'https://www.jd.com' },
      { title: '拼多多', url: 'https://www.pinduoduo.com' },
    ]},
    { name: '知识学习', bookmarks: [
      { title: '维基百科', url: 'https://zh.wikipedia.org' },
      { title: 'Dribbble', url: 'https://dribbble.com' },
      { title: 'Canva', url: 'https://www.canva.com' },
    ]},
  ];

  var data = [];
  var pendingImport = null;
  var editingIdx = null;
  var editSecIdx = null;

  // ===== Init =====
  function init() {
    load();
    initParticles();
    initMouseGlow();
    initAncientSymbols();
    render();
    setupDrop();
    setupDrag();
  }

  // ===== Ancient Floating Symbols =====
  function initAncientSymbols() {
    var symbols = 'ᚠ ᚢ ᚦ ᚨ ᚱ ᚲ ᚷ ᚹ ᚺ ᚾ ᛁ ᛃ ᛇ ᛈ ᛉ ᛊ ᛏ ᛒ ᛖ ᛗ ᛚ ᛝ ᛞ ᛟ ☽ ☾ ⍟ ⊛ ⊜ ⊞ ⊠ ◈ ◇ ⟐ ⟁ △ ▽ ⊘ ⊙ ◎ ☸ ✦ ⍟'.split(' ');
    var container = document.getElementById('ancientSymbols');
    for (var i = 0; i < 18; i++) {
      var span = document.createElement('span');
      span.className = 'ancient-sym';
      span.textContent = symbols[Math.floor(Math.random() * symbols.length)];
      span.style.left = (Math.random() * 100) + '%';
      span.style.animationDuration = (18 + Math.random() * 20) + 's';
      span.style.animationDelay = (Math.random() * 20) + 's';
      span.style.fontSize = (12 + Math.random() * 10) + 'px';
      container.appendChild(span);
    }
  }

  // ===== Storage =====
  function load() {
    try { var d = localStorage.getItem(KEY); if (d) data = JSON.parse(d); } catch(e) {}
    if (!data || !data.length) { data = JSON.parse(JSON.stringify(DEFAULT)); save(); }
  }
  function save() { try { localStorage.setItem(KEY, JSON.stringify(data)); } catch(e) {} }

  // ===== Particles =====
  function initParticles() {
    var c = document.getElementById('particleBg'), ctx = c.getContext('2d');
    var pts = [], meteors = [], mouse = {x:-999,y:-999};
    function resize() { c.width = window.innerWidth; c.height = window.innerHeight; }
    resize(); window.addEventListener('resize', resize);
    for (var i = 0; i < 70; i++) pts.push({
      x: Math.random()*c.width, y: Math.random()*c.height,
      vx: (Math.random()-0.5)*0.4, vy: (Math.random()-0.5)*0.4,
      sz: Math.random()*1.8+0.5, op: Math.random()*0.4+0.15, hue: 240+Math.random()*60
    });
    document.addEventListener('mousemove', function(e) { mouse.x=e.clientX; mouse.y=e.clientY; });

    // Spawn occasional meteor
    function spawnMeteor() {
      meteors.push({
        x: Math.random()*c.width, y: -10,
        vx: -1.5 - Math.random()*2, vy: 4 + Math.random()*4,
        life: 1, decay: 0.008 + Math.random()*0.006,
        len: 40 + Math.random()*60
      });
      setTimeout(spawnMeteor, 3000 + Math.random()*8000);
    }
    setTimeout(spawnMeteor, 2000);

    (function draw() {
      ctx.clearRect(0,0,c.width,c.height);

      // Draw particles
      pts.forEach(function(p) {
        p.x+=p.vx; p.y+=p.vy;
        if(p.x<0||p.x>c.width)p.vx*=-1; if(p.y<0||p.y>c.height)p.vy*=-1;
        var dx=p.x-mouse.x, dy=p.y-mouse.y, d=Math.sqrt(dx*dx+dy*dy);
        if(d<130){p.x+=dx*0.008;p.y+=dy*0.008;}
        ctx.beginPath(); ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);
        ctx.fillStyle='hsla('+p.hue+',80%,70%,'+p.op+')'; ctx.fill();
      });

      // Draw connections
      for(var i=0;i<pts.length;i++) for(var j=i+1;j<pts.length;j++){
        var dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y, d=Math.sqrt(dx*dx+dy*dy);
        if(d<140){ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);
        ctx.strokeStyle='hsla(270,60%,65%,'+(1-d/140)*0.12+')';ctx.lineWidth=0.5;ctx.stroke();}
      }

      // Draw meteors
      for (var m = meteors.length-1; m >= 0; m--) {
        var mt = meteors[m];
        mt.x += mt.vx; mt.y += mt.vy; mt.life -= mt.decay;
        if (mt.life <= 0) { meteors.splice(m, 1); continue; }
        var grad = ctx.createLinearGradient(mt.x, mt.y, mt.x - mt.vx*mt.len/5, mt.y - mt.vy*mt.len/5);
        grad.addColorStop(0, 'rgba(200,180,255,' + mt.life*0.8 + ')');
        grad.addColorStop(0.3, 'rgba(139,92,246,' + mt.life*0.5 + ')');
        grad.addColorStop(1, 'rgba(139,92,246,0)');
        ctx.beginPath();
        ctx.moveTo(mt.x, mt.y);
        ctx.lineTo(mt.x - mt.vx*mt.len/5, mt.y - mt.vy*mt.len/5);
        ctx.strokeStyle = grad;
        ctx.lineWidth = 1.5;
        ctx.stroke();
        // Head glow
        ctx.beginPath(); ctx.arc(mt.x, mt.y, 2, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(220,210,255,' + mt.life*0.9 + ')';
        ctx.fill();
      }

      requestAnimationFrame(draw);
    })();
  }

  // ===== Mouse Glow =====
  function initMouseGlow() {
    var g = document.getElementById('mouseGlow');
    document.addEventListener('mousemove', function(e) { g.style.left=e.clientX+'px'; g.style.top=e.clientY+'px'; });
    // Subtle color shift on mouse glow
    var hue = 260;
    setInterval(function() {
      hue = 260 + Math.sin(Date.now()/5000) * 20;
      g.style.background = 'radial-gradient(circle, hsla('+hue+',70%,60%,0.1), transparent 70%)';
    }, 100);
  }

  // ===== Render =====
  function render() {
    renderSections();
  }

  function renderStats() {
    var total = 0;
    data.forEach(function(s) { total += (s.bookmarks||[]).length; });
    document.getElementById('statsBar').innerHTML =
      '<div class="chip">📊 总计 <b>'+total+'</b> 个书签</div>' +
      '<div class="chip">📁 <b>'+data.length+'</b> 个分组</div>' +
      '<div class="chip">💡 拖拽标题栏排序</div>';
    document.getElementById('clearAllBtn').style.display = total > 0 ? '' : 'none';
  }

  function renderSections(filter) {
    var box = document.getElementById('sections');
    box.innerHTML = '';
    var term = (document.getElementById('search') ? document.getElementById('search').value : '').toLowerCase().trim();

    data.forEach(function(sec, si) {
      var bms = (sec.bookmarks || []).filter(function(b) {
        if (!term) return true;
        return (b.title||'').toLowerCase().indexOf(term)!==-1 || (b.url||'').toLowerCase().indexOf(term)!==-1;
      });
      if (term && bms.length === 0) return;

      var block = document.createElement('div');
      block.className = 'section-block';
      block.dataset.idx = si;
      block.style.animationDelay = (si * 0.06) + 's';

      var icon = ICONS[hashCode(sec.name) % ICONS.length];
      var header =
        '<div class="sec-header" data-idx="'+si+'">' +
          '<div class="sec-drag-handle"><span></span><span></span><span></span></div>' +
          '<span class="sec-icon">'+icon+'</span>' +
          '<span class="sec-title">'+esc(sec.name)+'</span>' +
          '<span class="sec-count">'+bms.length+'</span>' +
          '<div class="sec-actions">' +
            '<button class="sec-act-btn add" title="添加书签" onclick="addBookmark('+si+')">➕</button>' +
            '<button class="sec-act-btn" title="重命名" onclick="renameSec('+si+')">✏️</button>' +
            '<button class="sec-act-btn del" title="删除分组" onclick="deleteSec('+si+')">🗑️</button>' +
          '</div>' +
        '</div>';

      var body = '<div class="sec-body"><div class="bm-grid">';
      bms.forEach(function(b, bi) {
        var domain = getDomain(b.url);
        var fav = 'https://www.google.com/s2/favicons?domain='+domain+'&sz=64';
        body +=
          '<div class="bm-card" data-s="'+si+'" data-b="'+bi+'" style="animation-delay:'+(bi*0.03)+'s">' +
            '<div class="bm-actions">' +
              '<button class="bm-act-btn edit" title="编辑" onclick="event.stopPropagation();editBookmark('+si+','+bi+')">✏️</button>' +
              '<button class="bm-act-btn move" title="移动到" onclick="event.stopPropagation();moveBookmark('+si+','+bi+')">📁</button>' +
              '<button class="bm-act-btn del" title="删除" onclick="event.stopPropagation();deleteBookmark('+si+','+bi+')">🗑️</button>' +
            '</div>' +
            '<div class="bm-card-top">' +
              '<div class="bm-favicon"><img src="'+fav+'" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'block\'"><span class="fb" style="display:none">🔗</span></div>' +
              '<div class="bm-info"><div class="bm-name">'+esc(b.title||b.url)+'</div><div class="bm-domain">'+esc(domain)+'</div></div>' +
            '</div>' +
          '</div>';
      });
      body += '</div>';
      // Add card
      body += '<div class="bm-add-card" onclick="addBookmark('+si+')"><span>➕</span> 添加书签</div>';
      body += '</div>';

      block.innerHTML = header + body;
      box.appendChild(block);

      // Card click -> open
      block.querySelectorAll('.bm-card').forEach(function(card) {
        card.addEventListener('click', function() {
          var s = parseInt(card.dataset.s), b = parseInt(card.dataset.b);
          var bm = data[s] && data[s].bookmarks && data[s].bookmarks[b];
          if (bm && bm.url) window.open(bm.url, '_blank');
        });
      });
    });

    // Re-init drag after render
    setupDrag();
  }

  // ===== Drag Sections =====
  var dragSrc = null;

  function setupDrag() {
    var headers = document.querySelectorAll('.sec-header');
    headers.forEach(function(h) {
      h.setAttribute('draggable', 'true');
      h.addEventListener('dragstart', function(e) {
        dragSrc = h.closest('.section-block');
        dragSrc.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', h.dataset.idx);
      });
      h.addEventListener('dragend', function() {
        if (dragSrc) dragSrc.classList.remove('dragging');
        document.querySelectorAll('.section-block').forEach(function(b) { b.classList.remove('drag-over'); });
        dragSrc = null;
      });
      h.addEventListener('dragover', function(e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        var target = h.closest('.section-block');
        if (target !== dragSrc) target.classList.add('drag-over');
      });
      h.addEventListener('dragleave', function() {
        h.closest('.section-block').classList.remove('drag-over');
      });
      h.addEventListener('drop', function(e) {
        e.preventDefault();
        var target = h.closest('.section-block');
        target.classList.remove('drag-over');
        if (!dragSrc || target === dragSrc) return;

        var fromIdx = parseInt(dragSrc.dataset.idx);
        var toIdx = parseInt(target.dataset.idx);

        // Swap in data
        var item = data.splice(fromIdx, 1)[0];
        data.splice(toIdx, 0, item);
        save();
        renderSections();

        toast('分组已移动', 'ok');
      });
    });
  }

  // ===== Search =====
  window.doSearch = function() { renderSections(true); };

  // ===== Section Actions =====
  window.renameSec = function(idx) {
    var n = prompt('重命名分组「' + data[idx].name + '」为：', data[idx].name);
    if (!n || !n.trim() || n.trim() === data[idx].name) return;
    data[idx].name = n.trim();
    save(); render(); toast('分组已重命名', 'ok');
  };

  window.deleteSec = function(idx) {
    if (!confirm('确定删除分组「' + data[idx].name + '」及其下所有书签吗？')) return;
    data.splice(idx, 1);
    save(); render(); toast('分组已删除', 'ok');
  };

  // ===== Bookmark Actions =====
  window.addBookmark = function(secIdx) {
    editingIdx = null; editSecIdx = secIdx;
    document.getElementById('edTitle').value = '';
    document.getElementById('edUrl').value = '';
    populateFolderSel(secIdx);
    openModal('editModal');
  };

  window.editBookmark = function(si, bi) {
    var b = data[si].bookmarks[bi];
    editingIdx = bi; editSecIdx = si;
    document.getElementById('edTitle').value = b.title || '';
    document.getElementById('edUrl').value = b.url || '';
    populateFolderSel(si);
    openModal('editModal');
  };

  window.saveEdit = function() {
    var t = document.getElementById('edTitle').value.trim();
    var u = document.getElementById('edUrl').value.trim();
    var fi = parseInt(document.getElementById('edFolder').value);
    if (!t) { toast('标题不能为空', 'err'); return; }
    if (!u) { toast('网址不能为空', 'err'); return; }

    if (editingIdx === null) {
      // Add new
      data[fi].bookmarks.push({ title: t, url: u });
    } else {
      // Move & update
      var old = data[editSecIdx].bookmarks.splice(editingIdx, 1)[0];
      old.title = t; old.url = u;
      data[fi].bookmarks.push(old);
    }
    save(); render(); closeModal('editModal'); toast('已保存', 'ok');
  };

  window.deleteBookmark = function(si, bi) {
    var b = data[si].bookmarks[bi];
    if (!confirm('确定删除「' + b.title + '」吗？')) return;
    data[si].bookmarks.splice(bi, 1);
    save(); render(); toast('已删除', 'ok');
  };

  window.moveBookmark = function(si, bi) {
    var opts = data.map(function(s, i) { return (i+1) + '. ' + s.name + (i===si?' (当前)':''); }).join('\n');
    var c = prompt('移动到分组：\n\n' + opts);
    if (!c) return; c = c.trim();
    var n = parseInt(c);
    if (n > 0 && n <= data.length) {
      if (n-1 === si) return;
      var bm = data[si].bookmarks.splice(bi, 1)[0];
      data[n-1].bookmarks.push(bm);
      save(); render(); toast('已移动到「' + data[n-1].name + '」', 'ok');
    } else toast('无效选择', 'err');
  };

  function populateFolderSel(currentSec) {
    var sel = document.getElementById('edFolder');
    sel.innerHTML = '';
    data.forEach(function(s, i) {
      var o = document.createElement('option');
      o.value = i; o.textContent = s.name + ' (' + s.bookmarks.length + ')';
      if (i === currentSec) o.selected = true;
      sel.appendChild(o);
    });
  }

  // ===== Add Section =====
  window.confirmAddSec = function() {
    var n = document.getElementById('newSecName').value.trim();
    if (!n) { toast('请输入分组名称', 'err'); return; }
    data.push({ name: n, bookmarks: [] });
    save(); render(); closeModal('addSecModal'); toast('分组「' + n + '」已创建', 'ok');
  };

  // ===== Clear All =====
  window.clearAll = function() {
    if (!confirm('确定清空所有数据吗？')) return;
    data = []; save(); render(); toast('已清空', 'info');
  };

  // ===== Export =====
  window.exportAll = function() {
    var total = 0; data.forEach(function(s) { total += s.bookmarks.length; });
    if (!total) { toast('暂无书签', 'err'); return; }
    var html = ['<!DOCTYPE NETSCAPE-Bookmark-file-1>','<META HTTP-EQUIV="Content-Type" CONTENT="text/html; charset=UTF-8">','<TITLE>Bookmarks</TITLE>','<H1>Bookmarks</H1>','<DL><p>'];
    data.forEach(function(s) {
      html.push('    <DT><H3>'+esc(s.name)+'</H3>');
      html.push('    <DL><p>');
      s.bookmarks.forEach(function(b) { html.push('        <DT><A HREF="'+esc(b.url)+'">'+esc(b.title)+'</A>'); });
      html.push('    </DL><p>');
    });
    html.push('</DL><p>');
    var blob = new Blob([html.join('\n')], {type:'text/html;charset=utf-8'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = 'aionui_bookmarks_' + new Date().toISOString().slice(0,10) + '.html';
    a.click(); URL.revokeObjectURL(url);
    toast('已导出', 'ok');
  };

  // ===== File Import =====
  function setupDrop() {
    var dz = document.getElementById('dropZone');
    dz.addEventListener('dragover', function(e) { e.preventDefault(); dz.classList.add('over'); });
    dz.addEventListener('dragleave', function(e) { e.preventDefault(); dz.classList.remove('over'); });
    dz.addEventListener('drop', function(e) { e.preventDefault(); dz.classList.remove('over'); if(e.dataTransfer.files.length>0) processFile(e.dataTransfer.files[0]); });
  }
  window.handleFile = function(e) { if(e.target.files.length>0) processFile(e.target.files[0]); };

  function processFile(file) {
    if (!file.name.match(/\.html?$/i)) { toast('请选择 HTML 书签文件', 'err'); return; }
    var prog = document.getElementById('importProg'), bar = document.getElementById('progFill'), txt = document.getElementById('progTxt');
    prog.classList.add('show'); bar.style.width = '20%'; txt.textContent = '读取文件...';
    var reader = new FileReader();
    reader.onload = function(e) {
      bar.style.width = '50%'; txt.textContent = '解析书签...';
      setTimeout(function() {
        try {
          var parsed = parseHTML(e.target.result);
          bar.style.width = '80%'; txt.textContent = '解析完成！共 ' + parsed.length + ' 个书签';
          setTimeout(function() {
            bar.style.width = '100%'; pendingImport = parsed; showPreview(parsed);
            setTimeout(function() { prog.classList.remove('show'); }, 400);
          }, 200);
        } catch(err) { prog.classList.remove('show'); toast('解析失败', 'err'); }
      }, 250);
    };
    reader.onerror = function() { prog.classList.remove('show'); toast('读取失败', 'err'); };
    reader.readAsText(file, 'utf-8');
  }

  function parseHTML(html) {
    var doc = new DOMParser().parseFromString(html, 'text/html'), results = [], today = new Date().toISOString().slice(0,10);
    function walk(node, fp) {
      if (node.nodeType !== 1) return;
      var tn = node.tagName.toUpperCase();
      if (tn==='DT'||tn==='DL') { if(node.children) for(var i=0;i<node.children.length;i++) walk(node.children[i],fp); return; }
      if (tn==='H3') { fp = node.textContent.trim(); return; }
      if (tn==='A') {
        var t=node.textContent.trim(), u=node.getAttribute('href');
        if(!u||u.indexOf('javascript:')===0||u.indexOf('place:')===0) return;
        if(!t) t=getDomain(u);
        results.push({title:t, url:u, folder:fp||'导入书签'});
        return;
      }
      for(var j=0;j<node.childNodes.length;j++) walk(node.childNodes[j],fp);
    }
    var root = doc.querySelector('DL');
    if (root) walk(root, '');
    else doc.querySelectorAll('a[href]').forEach(function(a) {
      var u=a.getAttribute('href');
      if(!u||u.indexOf('javascript:')===0||u.indexOf('place:')===0) return;
      results.push({title:a.textContent.trim()||getDomain(u), url:u, folder:'导入书签'});
    });
    return results;
  }

  function showPreview(items) {
    document.getElementById('impPreview').classList.add('show');
    document.getElementById('impCount').textContent = '共 ' + items.length + ' 个书签';
    var h = '', sc = Math.min(items.length, 40);
    for (var i = 0; i < sc; i++) {
      h += '<div class="imp-item"><span class="imp-ico">🔗</span><span class="imp-name">'+esc(items[i].title)+'</span><span class="imp-folder">'+esc(items[i].folder||'')+'</span></div>';
    }
    if (items.length > 40) h += '<div style="text-align:center;padding:8px;font-size:0.82rem;color:var(--muted)">... 还有 '+(items.length-40)+' 个</div>';
    document.getElementById('impList').innerHTML = h;
    document.getElementById('confirmBtn').style.display = '';
  }

  window.confirmImport = function() {
    if (!pendingImport || !pendingImport.length) return;
    // Group by folder
    var map = {};
    pendingImport.forEach(function(b) {
      var f = b.folder || '导入书签';
      if (!map[f]) map[f] = [];
      map[f].push({ title: b.title, url: b.url });
    });
    Object.keys(map).forEach(function(f) {
      var existing = data.find(function(s) { return s.name === f; });
      if (existing) {
        existing.bookmarks = existing.bookmarks.concat(map[f]);
      } else {
        data.push({ name: f, bookmarks: map[f] });
      }
    });
    pendingImport = null;
    save(); render(); closeModal('importModal');
    toast('导入成功！共 ' + Object.keys(map).length + ' 个分组', 'ok');
  };

  // ===== Modal Helpers =====
  window.openModal = function(id) {
    document.getElementById(id).classList.add('show');
    if (id === 'importModal') {
      document.getElementById('impPreview').classList.remove('show');
      document.getElementById('confirmBtn').style.display = 'none';
      document.getElementById('importProg').classList.remove('show');
      document.getElementById('fileInput').value = '';
      pendingImport = null;
    }
    if (id === 'addSecModal') document.getElementById('newSecName').value = '';
  };
  window.closeModal = function(id) { document.getElementById(id).classList.remove('show'); };

  // ===== Toast =====
  function toast(msg, type) {
    var box = document.getElementById('toastBox'), t = document.createElement('div');
    t.className = 'toast toast-' + (type==='ok'?'ok':type==='err'?'err':'info');
    var icons = {ok:'✅',err:'❌',info:'ℹ️'};
    t.innerHTML = '<span>'+(icons[type]||'ℹ️')+'</span><span>'+esc(msg)+'</span>';
    box.appendChild(t);
    setTimeout(function(){t.classList.add('out');setTimeout(function(){if(t.parentNode)t.parentNode.removeChild(t);},300);},2500);
  }

  // ===== Utils =====
  function esc(s){if(!s)return '';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function getDomain(url){try{if(url.indexOf('://')===-1)url='https://'+url;return new URL(url).hostname.replace(/^www\./,'');}catch(e){return url;}}
  function hashCode(s){var h=0;for(var i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}return Math.abs(h);}

  document.addEventListener('DOMContentLoaded', init);
})();
</script>
</body>
</html>
