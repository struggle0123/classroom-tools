<script>
/* ================================================================
   语文课堂互动乐园 - 主脚本
   ================================================================ */

// ========== 全局状态 ==========
const S = {
  page:'home', catIdx:null, modIdx:null,
  score:0, correct:0, wrong:0,
  qIdx:0, questions:[],
  timer:null, timeLeft:30, timeMax:30,
  answered:false
};

// ========== 音效引擎（Web Audio API） ==========
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx = null;
function getAudioCtx(){ if(!actx) actx = new AudioCtx(); return actx; }
function playTone(freq, dur, type='sine', vol=0.15){
  try{
    const c=getAudioCtx(), o=c.createOscillator(), g=c.createGain();
    o.type=type; o.frequency.value=freq;
    g.gain.setValueAtTime(vol,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);
    o.connect(g); g.connect(c.destination);
    o.start(); o.stop(c.currentTime+dur);
  }catch(e){}
}
const SFX = {
  click(){ playTone(800,.08,'sine',.1); },
  correct(){ playTone(523,.1); setTimeout(()=>playTone(659,.1),100); setTimeout(()=>playTone(784,.2),200); },
  wrong(){ playTone(200,.3,'sawtooth',.1); },
  reveal(){ playTone(440,.15); setTimeout(()=>playTone(660,.15),120); }
};

// ========== 分类定义 ==========
const categories = [
  { name:'字词类', icon:'🔤', desc:'认字写字，词语积累', color:'#5B7FFF', mods:[0,1,2,3] },
  { name:'句子类', icon:'📝', desc:'句式变换，语感培养', color:'#818CF8', mods:[4,5,6] },
  { name:'阅读理解类', icon:'📖', desc:'课文回顾，深度理解', color:'#A78BFA', mods:[7,8,9] },
  { name:'表达类', icon:'💬', desc:'口语表达，创意写作', color:'#C084FC', mods:[10,11,12] },
  { name:'综合趣味类', icon:'🎯', desc:'趣味闯关，知识拓展', color:'#E879F9', mods:[13,14,15,16] },
  { name:'小组竞赛类', icon:'🏆', desc:'团队协作，知识竞赛', color:'#F472B6', mods:[17,18] }
];

// ========== 模块定义 ==========
const M = [];

// ------ 模块0: 看图写词语 (freeInput) ------
M[0] = { name:'看图写词语', engine:'freeInput', cat:0, questions:[

// ========== 页面路由 ==========
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  S.page=id;
  window.scrollTo(0,0);
}

function goHome(){ showPage('home'); }
function goCategory(){
  if(S.catIdx!==null) showCategory(S.catIdx);
  else showPage('home');
}

// ========== 首页渲染 ==========
function renderHome(){
  const grid=document.getElementById('category-grid');
  grid.innerHTML=categories.map((c,i)=>`
    <div class="glass-card category-card" onclick="showCategory(${i})" style="animation:slideUp .4s ease ${i*.08}s both">
      <span class="icon">${c.icon}</span>
      <div class="name">${c.name}</div>
      <div class="count">${c.mods.length} 个模块</div>
    </div>
  `).join('');
}

// ========== 分类页渲染 ==========
function showCategory(idx){
  S.catIdx=idx;
  const cat=categories[idx];
  document.getElementById('cat-title').textContent=cat.icon+' '+cat.name;
  document.getElementById('cat-subtitle').textContent=cat.desc;
  const grid=document.getElementById('module-grid');
  const engineLabel={quiz:'选择题',fill:'填空题',match:'连线题',sort:'排序题',chain:'接龙',classify:'分类题',freeInput:'自由输入'};
  grid.innerHTML=cat.mods.map((mi,i)=>{
    const m=M[mi];
    return `<div class="glass-card module-card" onclick="startModule(${mi})" style="animation:slideUp .4s ease ${i*.08}s both">
      <div class="name">${m.name}</div>
      <div class="type">${engineLabel[m.engine]||m.engine}</div>
    </div>`;
  }).join('');
  showPage('category');
}

// ========== 启动模块 ==========
function startModule(idx){
  S.modIdx=idx; S.score=0; S.correct=0; S.wrong=0; S.qIdx=0; S.answered=false;
  const m=M[idx];
  document.getElementById('game-module-name').textContent=m.name;
  // 初始化题目
  if(m.engine==='chain'){
    S.chainData={...m.chains[0], history:[], poolCopy:[...m.chains[0].pool], idx:0};
    S.questions=m.chains;
  } else if(m.engine==='match'){
    S.matchData={pairs:shuffle([...m.pairs]), selected:null, matched:0};
    S.questions=m.pairs;
  } else if(m.engine==='classify'){
    S.classifyData={...m.questions[0], idx:0, placed:{}};
    S.questions=m.questions;
  } else {
    S.questions=shuffle([...m.questions]);
  }
  S.timeMax=m.engine==='chain'?20:30;
  updateStats();
  renderQuestion();
  showPage('game');
}

// ========== 更新统计 ==========
function updateStats(){
  document.getElementById('stat-score').textContent=S.score;
  const total=S.questions.length;
  document.getElementById('stat-progress').textContent=`${Math.min(S.qIdx+1,total)}/${total}`;
  const pct=((S.qIdx+1)/total)*100;
  document.getElementById('game-progress-fill').style.width=pct+'%';
}

// ========== 倒计时 ==========
function startTimer(){
  S.timeLeft=S.timeMax;
  updateTimerUI();
  S.timer=setInterval(()=>{
    S.timeLeft-=0.1;
    updateTimerUI();
    if(S.timeLeft<=0){ clearInterval(S.timer); S.timer=null; if(!S.answered) timeUp(); }
  },100);
}
function stopTimer(){ if(S.timer){clearInterval(S.timer);S.timer=null;} }
function updateTimerUI(){
  const t=Math.max(0,S.timeLeft);
  document.getElementById('timer-text').textContent=`剩余 ${Math.ceil(t)} 秒`;
  const pct=(t/S.timeMax)*100;
  const fill=document.getElementById('timer-fill');
  fill.style.width=pct+'%';
  fill.classList.remove('warning','danger');
  if(pct<30) fill.classList.add('danger');
  else if(pct<60) fill.classList.add('warning');
}
function timeUp(){
  S.answered=true; S.wrong++; SFX.wrong();
  // 根据引擎类型处理超时
  const m=M[S.modIdx];
  if(m.engine==='quiz') showQuizTimeout();
  else if(m.engine==='fill') showFillTimeout();
  else if(m.engine==='chain') showChainTimeout();
  else if(m.engine==='freeInput') showFreeTimeout();
  else if(m.engine==='sort') checkSortAnswer();
  else if(m.engine==='classify') checkClassifyAnswer();
  else if(m.engine==='match'){} // match没有超时
}

// ========== 渲染题目 ==========
function renderQuestion(){
  stopTimer();
  S.answered=false;
  const m=M[S.modIdx];
  const content=document.getElementById('game-content');
  const actions=document.getElementById('game-actions');
  content.innerHTML=''; actions.innerHTML='';
  updateStats();

  if(m.engine==='quiz' || m.engine==='chain'){
    startTimer();
  } else if(m.engine==='fill' || m.engine==='sort' || m.engine==='freeInput' || m.engine==='classify'){
    startTimer();
  }

  switch(m.engine){
    case 'quiz': renderQuiz(content,actions); break;
    case 'fill': renderFill(content,actions); break;
    case 'match': renderMatch(content,actions); break;
    case 'sort': renderSort(content,actions); break;
    case 'chain': renderChain(content,actions); break;
    case 'classify': renderClassify(content,actions); break;
    case 'freeInput': renderFreeInput(content,actions); break;
  }
}

// ========== 引擎1: quiz 选择题 ==========
function renderQuiz(content,actions){
  const q=S.questions[S.qIdx];
  const labels=['A','B','C','D'];
  content.innerHTML=`
    <div class="question-text">${q.q}</div>
    <div class="quiz-options" id="quiz-opts">
      ${q.opts.map((o,i)=>`
        <button class="quiz-option" onclick="checkQuiz(${i})" data-idx="${i}">
          <span class="label">${labels[i]}</span>${o}
        </button>
      `).join('')}
    </div>
    <div id="quiz-exp"></div>
  `;
  actions.innerHTML=`<button class="btn btn-primary" id="btn-next" style="display:none" onclick="nextQuestion()">下一题</button>`;
}
function checkQuiz(idx){
  if(S.answered) return;
  S.answered=true; stopTimer();
  SFX.click();
  const q=S.questions[S.qIdx];
  const opts=document.querySelectorAll('.quiz-option');
  opts.forEach(o=>o.classList.add('disabled'));
  if(idx===q.ans){
    opts[idx].classList.add('correct');
    S.score+=10; S.correct++; SFX.correct();
  } else {
    opts[idx].classList.add('wrong');
    opts[q.ans].classList.add('correct');
    S.wrong++; SFX.wrong();
  }
  document.getElementById('quiz-exp').innerHTML=`<div class="explanation">${q.exp}</div>`;
  document.getElementById('btn-next').style.display='inline-flex';
  updateStats();
}
function showQuizTimeout(){
  const q=S.questions[S.qIdx];
  const opts=document.querySelectorAll('.quiz-option');
  opts.forEach(o=>o.classList.add('disabled'));
  opts[q.ans].classList.add('correct');
  document.getElementById('quiz-exp').innerHTML=`<div class="explanation">时间到！正确答案是 ${q.opts[q.ans]}。${q.exp}</div>`;
  const btn=document.getElementById('btn-next');
  if(btn) btn.style.display='inline-flex';

function renderFill(content,actions){

    for(let i=0;i<parts.length;i++){
      if(/^\d+$/.test(parts[i])){

        html+=parts[i];
      }
    }
    html+='</div>';
    if(q.hint) html+=`<div class="question-hint">提示：${q.hint}</div>`;
    html+=`<div class="fill-inputs" id="fill-inputs">
      ${q.answers.map((a,i)=>`<div class="fill-input-row"><label>第${i+1}空：</label><input type="text" id="fi-${i}" placeholder="请填写答案"></div>`).join('')}
    </div>`;

  } else {
    // 扩句缩句格式
    let html=`<div class="question-hint">${q.type==='expand'?'【扩句题】':'【缩句题】'} ${q.hint}</div>`;
    html+=`<div class="fill-sentence" style="margin-bottom:12px;font-weight:600;">原句：${q.base}</div>`;
    html+=`<div class="fill-sentence">${q.blanks.join('<br>')}</div>`;
    html+=`<div class="fill-inputs" id="fill-inputs">
      ${q.answers.map((a,i)=>`<div class="fill-input-row"><label>第${i+1}空：</label><input type="text" id="fi-${i}" placeholder="请填写答案"></div>`).join('')}
    </div>`;
    if(q.exp) html+=`<div class="question-hint" style="margin-top:8px">${q.exp}</div>`;

        <h3>答案</h3>
        ${rightShuffled.map((r,i)=>`<div class="match-item" data-side="right" data-idx="${i}" data-val="${r}" onclick="selectMatch(this,'right',${i})">${r}</div>`).join('')}
      </div>

}
let matchSelectedLeft=null;
function selectMatch(el,side,idx){
  if(el.classList.contains('matched')) return;
  SFX.click();
  if(side==='left'){
    document.querySelectorAll('#match-left .match-item').forEach(e=>e.classList.remove('selected'));
    el.classList.add('selected');
    matchSelectedLeft={el,idx};
  } else if(side==='right' && matchSelectedLeft){
    const leftEl=matchSelectedLeft.el;
    const leftIdx=matchSelectedLeft.idx;
    const rightVal=el.dataset.val;
    const correctRight=S.matchData.pairs[leftIdx].right;
    if(rightVal===correctRight){
      // 配对正确
      leftEl.classList.remove('selected');
      leftEl.classList.add('matched');
      el.classList.add('matched');
      S.matchData.matched++;
      S.score+=10; S.correct++;
      SFX.correct();
    } else {
      // 配对错误
      leftEl.classList.remove('selected');
      leftEl.classList.add('wrong-match');
      el.classList.add('wrong-match');
      S.wrong++;
      SFX.wrong();
      setTimeout(()=>{leftEl.classList.remove('wrong-match');el.classList.remove('wrong-match');},500);
    }
    matchSelectedLeft=null;
    document.getElementById('match-status').textContent='已配对：'+S.matchData.matched+' / '+S.matchData.pairs.length;
    if(S.matchData.matched>=S.matchData.pairs.length){
      setTimeout(()=>showResult(),600);
    }
  }
}

function renderSort(content,actions){

        </div>
      `).join('')}
    </div>
  `;
  actions.innerHTML=`<button class="btn btn-primary" onclick="checkSortAnswer()">提交排序</button>
    <button class="btn btn-outline" id="btn-sort-next" style="display:none" onclick="nextQuestion()">下一题</button>`;
  initSortDrag();
}
function initSortDrag(){
  const list=document.getElementById('sort-list');
  if(!list) return;
  const items=list.querySelectorAll('.sort-item');
  let dragEl=null, startY=0, dragStartIdx=0;

  items.forEach(item=>{
    // 鼠标事件
    item.addEventListener('mousedown',e=>startDrag(e,item));
    item.addEventListener('touchstart',e=>startDrag(e,item),{passive:false});
  });

  function startDrag(e,item){
    if(S.answered) return;
    e.preventDefault(); SFX.click();
    dragEl=item;
    const rect=item.getBoundingClientRect();
    startY=(e.touches?e.touches[0]:e).clientY;
    dragStartIdx=getItemIndex(item);
    item.classList.add('dragging');

    document.addEventListener('mousemove',onDrag);
    document.addEventListener('mouseup',endDrag);
    document.addEventListener('touchmove',onDrag,{passive:false});
    document.addEventListener('touchend',endDrag);
  }

  function onDrag(e){
    if(!dragEl) return;
    e.preventDefault();
    const y=(e.touches?e.touches[0]:e).clientY;
    const items=[...list.querySelectorAll('.sort-item:not(.dragging)')];
    const afterElement=getDragAfterElement(list,y);
    if(afterElement){
      list.insertBefore(dragEl,afterElement);
    } else {
      list.appendChild(dragEl);
    }
    updateOrderNums();
  }

  function endDrag(){
    if(!dragEl) return;
    dragEl.classList.remove('dragging');
    dragEl=null;
    document.removeEventListener('mousemove',onDrag);
    document.removeEventListener('mouseup',endDrag);
    document.removeEventListener('touchmove',onDrag);
    document.removeEventListener('touchend',endDrag);
  }

  function getDragAfterElement(container,y){
    const els=[...container.querySelectorAll('.sort-item:not(.dragging)')];
    return els.reduce((closest,child)=>{
      const box=child.getBoundingClientRect();
      const offset=y-box.top-box.height/2;
      if(offset<0 && offset>closest.offset) return {offset,element:child};
      return closest;
    },{offset:Number.NEGATIVE_INFINITY}).element;
  }

  function getItemIndex(item){ return [...list.children].indexOf(item); }
}
function updateOrderNums(){
  const items=document.querySelectorAll('#sort-list .sort-item');
  items.forEach((item,i)=>{const num=item.querySelector('.order-num');if(num)num.textContent=i+1;});
}
function checkSortAnswer(){
  if(S.answered) return;
  S.answered=true; stopTimer();

}

// ========== 引擎5: chain 接龙 ==========
function renderChain(content,actions){
  const d=S.chainData;
  content.innerHTML=`
    <div class="question-text">词语接龙：请输入以上一个词末字开头的词语</div>
    <div class="chain-display">
      <span class="chain-word" id="chain-current">${d.start}</span>
      <span class="chain-arrow">→</span>
    </div>
    <div class="chain-input-row">
      <input type="text" id="chain-input" placeholder="输入以"${d.start[d.start.length-1]}"开头的词语" onkeydown="if(event.key==='Enter')submitChain()">
      <button onclick="submitChain()">接!</button>
    </div>
    <div class="chain-history" id="chain-history"></div>
    <div id="chain-fb"></div>
  `;
  actions.innerHTML=`<button class="btn btn-outline" id="btn-chain-next" style="display:none" onclick="nextChainRound()">下一轮</button>
    <button class="btn btn-outline" id="btn-chain-skip" onclick="skipChain()">跳过</button>`;
  document.getElementById('chain-input').focus();
}
function submitChain(){
  if(S.answered) return;
  const input=document.getElementById('chain-input');
  const val=input.value.trim();
  if(!val) return;
  const d=S.chainData;
  const currentWord=d.history.length>0?d.history[d.history.length-1]:d.start;
  const lastChar=currentWord[currentWord.length-1];
  const fb=document.getElementById('chain-fb');

  if(val[0]!==lastChar){
    fb.className='chain-feedback err';
    fb.textContent=`"${val}"的第一个字"${val[0]}"不是"${lastChar}"，请重新输入以"${lastChar}"开头的词语。`;
    SFX.wrong();
    input.value='';
    input.focus();
    return;
  }
  if(d.history.includes(val)||val===d.start){
    fb.className='chain-feedback err';
    fb.textContent='这个词已经用过了，请换一个。';
    SFX.wrong();
    input.value='';
    input.focus();
    return;
  }
  // 接龙成功
  d.history.push(val);
  d.poolCopy=d.poolCopy.filter(w=>w!==val);
  S.score+=10; S.correct++;
  SFX.correct();
  fb.className='chain-feedback ok';
  fb.textContent='接龙成功！';
  // 更新显示
  document.getElementById('chain-current').textContent=val;
  document.getElementById('chain-current').style.animation='none';
  requestAnimationFrame(()=>{document.getElementById('chain-current').style.animation='bounceIn .4s';});
  const hist=document.getElementById('chain-history');
  hist.innerHTML+=`<span class="tag">${val}</span>`;
  input.value='';
  input.placeholder=`输入以"${val[val.length-1]}"开头的词语`;
  input.focus();
  setTimeout(()=>{fb.textContent='';fb.className='chain-feedback';},1500);
  updateStats();
  // 如果pool里没有可接的了，自动进入下一轮
  if(d.poolCopy.length===0 && d.history.length>=d.pool.length){
    stopTimer();
    document.getElementById('btn-chain-next').style.display='inline-flex';
    document.getElementById('btn-chain-skip').style.display='none';
    input.disabled=true;
  }
}
function skipChain(){
  S.wrong++; SFX.wrong();
  nextChainRound();
}
function nextChainRound(){
  const m=M[S.modIdx];
  S.qIdx++;
  if(S.qIdx>=m.chains.length){ showResult(); return; }
  const d=m.chains[S.qIdx];
  S.chainData={...d, history:[], poolCopy:[...d.pool], idx:S.qIdx};
  updateStats();
  stopTimer();
  renderQuestion();
}

    <button class="btn btn-outline" id="btn-classify-next" style="display:none" onclick="nextQuestion()">下一题</button>`;
  initClassifyDrag();

function initClassifyDrag(){
  const chips=document.querySelectorAll('.classify-chip');
  const boxes=document.querySelectorAll('.classify-box');
  let dragChip=null, dragClone=null, offsetX=0, offsetY=0;

  chips.forEach(chip=>{
    chip.addEventListener('mousedown',e=>cdStart(e,chip));
    chip.addEventListener('touchstart',e=>cdStart(e,chip),{passive:false});
  });

  function cdStart(e,chip){
    if(S.answered||chip.classList.contains('placed')) return;
    e.preventDefault(); SFX.click();
    dragChip=chip;
    const rect=chip.getBoundingClientRect();
    const pt=e.touches?e.touches[0]:e;
    offsetX=pt.clientX-rect.left;
    offsetY=pt.clientY-rect.top;

    // 创建克隆
    dragClone=chip.cloneNode(true);
    dragClone.style.cssText=`position:fixed;z-index:9999;width:${rect.width}px;pointer-events:none;opacity:.85;transform:scale(1.05);box-shadow:0 4px 16px rgba(91,127,255,.3);`;
    dragClone.style.left=(pt.clientX-offsetX)+'px';
    dragClone.style.top=(pt.clientY-offsetY)+'px';
    document.body.appendChild(dragClone);
    chip.classList.add('dragging');

    document.addEventListener('mousemove',cdMove);
    document.addEventListener('mouseup',cdEnd);
    document.addEventListener('touchmove',cdMove,{passive:false});
    document.addEventListener('touchend',cdEnd);
  }

  function cdMove(e){
    if(!dragClone) return;
    e.preventDefault();
    const pt=e.touches?e.touches[0]:e;
    dragClone.style.left=(pt.clientX-offsetX)+'px';
    dragClone.style.top=(pt.clientY-offsetY)+'px';
    // 高亮目标分类框
    boxes.forEach(box=>{
      const r=box.getBoundingClientRect();
      if(pt.clientX>=r.left&&pt.clientX<=r.right&&pt.clientY>=r.top&&pt.clientY<=r.bottom){
        box.classList.add('drag-over');
      } else {
        box.classList.remove('drag-over');
      }
    });
  }

  function cdEnd(e){
    if(!dragChip||!dragClone) return;
    const pt=e.changedTouches?e.changedTouches[0]:e;
    // 检查是否落在某个分类框上
    let dropped=false;
    boxes.forEach(box=>{
      const r=box.getBoundingClientRect();
      if(pt.clientX>=r.left&&pt.clientX<=r.right&&pt.clientY>=r.top&&pt.clientY<=r.bottom){
        const cat=box.dataset.cat;
        const chipVal=dragChip.dataset.chip;
        S.classifyData.placed[cat].push(chipVal);
        dragChip.classList.add('placed');
        dragChip.classList.remove('dragging');
        // 在分类框中显示
        const itemsDiv=document.getElementById('citems-'+cat);
        const tag=document.createElement('span');
        tag.className='classified-item';
        tag.textContent=chipVal;
        tag.dataset.chip=chipVal;
        itemsDiv.appendChild(tag);
        dropped=true;
        box.classList.remove('drag-over');
      }
      box.classList.remove('drag-over');
    });
    if(!dropped){
      dragChip.classList.remove('dragging');
    }
    dragClone.remove();
    dragClone=null;
    dragChip=null;
    document.removeEventListener('mousemove',cdMove);
    document.removeEventListener('mouseup',cdEnd);
    document.removeEventListener('touchmove',cdMove);
    document.removeEventListener('touchend',cdEnd);
  }
}
function checkClassifyAnswer(){
  if(S.answered) return;
  S.answered=true; stopTimer();
  const q=S.questions[S.qIdx];
  const d=S.classifyData;
  let allCorrect=true;
  // 检查每个分类中的词语
  q.categories.forEach(cat=>{
    const placed=d.placed[cat]||[];
    const correct=q.answers[cat]||[];
    const itemsDiv=document.getElementById('citems-'+cat);
    if(itemsDiv){
      itemsDiv.querySelectorAll('.classified-item').forEach(el=>{
        const chip=el.dataset.chip;
        if(correct.includes(chip)){
          el.classList.remove('wrong-item');
        } else {
          el.classList.add('wrong-item');
          allCorrect=false;
        }
      });
    }
  });
  // 检查是否有遗漏（未分类的）
  const unplaced=document.querySelectorAll('.classify-chip:not(.placed)');
  if(unplaced.length>0) allCorrect=false;
  // 检查数量是否正确
  q.categories.forEach(cat=>{
    const correct=q.answers[cat]||[];
    const placed=d.placed[cat]||[];
    if(placed.length!==correct.length) allCorrect=false;
  });
  if(allCorrect){ S.score+=10; S.correct++; SFX.correct(); }
  else { S.wrong++; SFX.wrong(); }
  const btn=document.getElementById('btn-classify-next');
  if(btn) btn.style.display='inline-flex';
  actions.querySelector('.btn-primary').style.display='none';
  updateStats();
}

    };
    let history=[];
    try{ history=JSON.parse(localStorage.getItem('chinese_game_history'))||[]; }catch(e){ history=[]; }
    history.unshift(record);
    if(history.length>50) history=history.slice(0,50);
    localStorage.setItem('chinese_game_history',JSON.stringify(history));
  }catch(e){}
}

// ========== 显示结果 ==========
function showResult(){
  stopTimer();
  saveGameRecord();
  const total=S.correct+S.wrong;
  const pct=total>0?Math.round(S.correct/total*100):0;
  let stars=0, comment='';
  if(pct>=90){ stars=3; comment='太棒了！你是语文小达人！'; }
  else if(pct>=70){ stars=2; comment='做得很好，继续加油！'; }
  else if(pct>=50){ stars=1; comment='还不错，再多练习会更好！'; }
  else { stars=0; comment='加油，多练习一定能进步！'; }

  document.getElementById('result-stars').textContent='⭐'.repeat(stars)+'☆'.repeat(3-stars);
  document.getElementById('result-score').textContent=S.score;
  document.getElementById('result-comment').textContent=comment;
  document.getElementById('result-correct').textContent=S.correct;
  document.getElementById('result-wrong').textContent=S.wrong;
  document.getElementById('result-total').textContent=total;
  showPage('result');
  SFX.reveal();
}

function restartGame(){ startModule(S.modIdx); }

// ========== 工具函数 ==========
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

// ========== 粒子背景 ==========
function initParticles(){
  const canvas=document.getElementById('particles');
  const ctx=canvas.getContext('2d');
  let W,H;
  const particles=[];
  const COUNT=30;

  function resize(){
    W=canvas.width=window.innerWidth;
    H=canvas.height=window.innerHeight;
  }
  resize();
  window.addEventListener('resize',resize);

  for(let i=0;i<COUNT;i++){
    particles.push({
      x:Math.random()*W, y:Math.random()*H,
      r:Math.random()*3+1,
      dx:(Math.random()-.5)*.3,
      dy:(Math.random()-.5)*.3,
      color:`rgba(91,127,255,${Math.random()*.15+.05})`
    });
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    particles.forEach(p=>{
      ctx.beginPath();
      ctx.arc(p.x,p.y,Math.max(0.5,p.r),0,Math.PI*2);
      ctx.fillStyle=p.color;
      ctx.fill();
      p.x+=p.dx; p.y+=p.dy;
      if(p.x<0||p.x>W) p.dx*=-1;
      if(p.y<0||p.y>H) p.dy*=-1;
    });
    requestAnimationFrame(draw);
  }
  // 检查用户是否偏好减少动画
  if(!window.matchMedia('(prefers-reduced-motion: reduce)').matches){
    draw();
  }
}

// ========== 初始化 ==========
document.addEventListener('DOMContentLoaded',()=>{
  renderHome();
  initParticles();
});
</script>
